<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script src="/static/js/auth.js"></script>
    <script>
        // 阻塞式检查认证，未认证则不渲染页面
        Auth.checkAuthBeforeRender().then(authenticated => {
            if (!authenticated) {
                // 阻止页面渲染
                document.write('<div style="display:none">');
            }
        });
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeClaw - Agent 控制台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a4a;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .logo-text h1 { font-size: 20px; color: #fff; }
        .logo-text span { font-size: 12px; color: #888; }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px; }
        .status-card {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px; padding: 25px; margin-bottom: 20px;
            border: 1px solid #2a2a4a;
        }
        .status-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .status-header h2 { font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .status-badge.pending { background: #f39c12; color: #000; }
        .status-badge.initialized { background: #27ae60; color: #fff; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .info-item { background: #0f0f1a; padding: 15px; border-radius: 10px; }
        .info-item label { font-size: 12px; color: #888; display: block; margin-bottom: 5px; }
        .info-item .value { font-size: 16px; color: #fff; }
        .section { margin-bottom: 30px; }
        .section h3 { font-size: 16px; margin-bottom: 15px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .action-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .action-card {
            background: #1a1a2e; border-radius: 12px; padding: 20px;
            border: 1px solid #2a2a4a; text-decoration: none; color: #e0e0e0;
            transition: all 0.2s; display: flex; align-items: center; gap: 15px;
        }
        .action-card:hover { background: #2a2a4a; transform: translateY(-2px); }
        .action-icon { font-size: 24px; }
        .action-text h4 { font-size: 16px; margin-bottom: 5px; }
        .action-text p { font-size: 12px; color: #888; }
        .empty { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <div class="logo-icon">🌊</div>
            <div class="logo-text">
                <h1>FeClaw</h1>
                <span id="agentHash">加载中...</span>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="section">
            <h3>📊 Agent 状态</h3>
            <div class="status-card">
                <div class="status-header">
                    <h2><span id="agentName">加载中...</span></h2>
                    <span class="status-badge" id="agentStatus">-</span>
                </div>
                <div class="info-grid">
                    <div class="info-item">
                        <label>Agent ID</label>
                        <div class="value" id="agentId">-</div>
                    </div>
                    <div class="info-item">
                        <label>创建时间</label>
                        <div class="value" id="createdAt">-</div>
                    </div>
                    <div class="info-item">
                        <label>消息渠道</label>
                        <div class="value" id="channels">-</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="section">
            <h3>🚀 快捷入口</h3>
            <div class="action-grid">
                <a href="/chat" class="action-card">
                    <span class="action-icon">💬</span>
                    <div class="action-text">
                        <h4>开始对话</h4>
                        <p>与 Agent 聊天</p>
                    </div>
                </a>
                <a href="/files/" class="action-card">
                    <span class="action-icon">📁</span>
                    <div class="action-text">
                        <h4>文件管理</h4>
                        <p>管理你的文件</p>
                    </div>
                </a>
                <a href="/settings" class="action-card">
                    <span class="action-icon">⚙️</span>
                    <div class="action-text">
                        <h4>配置管理</h4>
                        <p>调整 Agent 配置</p>
                    </div>
                </a>

            </div>
        </div>
    </div>
    <script>
        const host = window.location.host;
        const hashMatch = host.match(/^([a-f0-9]{4})\./);
        const agentHash = hashMatch ? hashMatch[1] : null;
        
        if (agentHash) {
            document.getElementById('agentHash').textContent = agentHash;
            fetch('/api/agent/info?agent_hash=' + agentHash)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('agentName').textContent = data.name;
                    document.getElementById('agentId').textContent = data.hash;
                    document.getElementById('createdAt').textContent = data.created_at;
                    document.getElementById('agentStatus').textContent = data.status;
                    document.getElementById('agentStatus').className = 'status-badge ' + data.status;
                    document.getElementById('channels').textContent = 
                        data.channels.map(c => c.name).join(', ') || '无';
                })
                .catch(e => console.error(e));
        }
    </script>
</body>
</html>
