<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeClaw Chat</title>
    <script src="/static/js/auth.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Markdown & Code Highlighting -->
    <script src="/static/marked.min.js"></script>
    <!-- KaTeX for math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --secondary: #764ba2;
            --bg-dark: #0a0a1a;
            --bg-chat: #0f0f23;
            --bg-message: #1a1a2e;
            --bg-input: #12122a;
            --text-light: #e0e0e0;
            --text-dim: #888;
            --text-muted: #666;
            --border: rgba(102, 126, 234, 0.2);
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: var(--bg-chat);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .new-chat-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--gradient);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .new-chat-btn:hover {
            transform: scale(1.1);
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .session-item {
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .session-item:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .session-item.active {
            background: rgba(102, 126, 234, 0.2);
        }

        .session-avatar {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .session-info {
            flex: 1;
            min-width: 0;
            position: relative;
        }

        .session-title {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
            padding-right: 60px;
        }

        .session-preview {
            font-size: 12px;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-time {
            position: absolute;
            top: 0;
            right: 0;
            font-size: 11px;
            color: var(--text-muted);
        }

        .session-item .delete-btn {
            opacity: 0;
            transition: opacity 0.2s;
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 14px;
            flex-shrink: 0;
            padding: 4px;
        }

        .session-item:hover .delete-btn {
            opacity: 1;
        }

        .session-item .delete-btn:hover {
            color: #ff6b6b;
        }

        /* 主聊天区域 */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .back-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        /* WebSocket 连接状态指示器 */
        .ws-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-left: 10px;
            font-size: 12px;
        }

        .ws-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .ws-status-dot.connected {
            background: #4ade80;
            box-shadow: 0 0 8px rgba(74, 222, 128, 0.4);
        }

        .ws-status-dot.connecting {
            background: #facc15;
            box-shadow: 0 0 8px rgba(250, 204, 21, 0.4);
            animation: pulse-yellow 1.5s ease-in-out infinite;
        }

        .ws-status-dot.disconnected {
            background: #ef4444;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.4);
        }

        @keyframes pulse-yellow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .ws-status-tooltip {
            color: var(--text-dim);
            font-size: 11px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .ws-status:hover .ws-status-tooltip {
            opacity: 1;
        }

        /* 消息区域 */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 15px;
        }

        .message.user {
            background: var(--gradient);
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }

        .message.assistant {
            background: var(--bg-message);
            align-self: flex-start;
            border-bottom-left-radius: 6px;
        }

        .message .typing-cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background: var(--primary);
            margin-left: 2px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state h2 {
            font-size: 24px;
            margin-bottom: 12px;
            color: var(--text-light);
        }

        .empty-state p {
            font-size: 15px;
        }

        /* 输入区域 */
        .input-container {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            background: var(--bg-input);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            background: var(--bg-message);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 18px;
            color: var(--text-light);
            font-size: 15px;
            font-family: inherit;
            resize: none;
            min-height: 50px;
            max-height: 150px;
            line-height: 1.5;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            background: var(--gradient);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, opacity 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 图片按钮 */
        .image-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--bg-message);
            border: 1px solid var(--border);
            color: var(--text-light);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .image-btn:hover {
            background: var(--primary);
        }

        /* 图片预览区域 */
        .image-preview-area {
            padding: 10px 0;
        }

        .image-preview-wrapper {
            display: inline-flex;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            max-width: 200px;
        }

        .image-preview-wrapper img {
            max-width: 200px;
            max-height: 150px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .remove-image-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 24px;
            height: 24px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remove-image-btn:hover {
            background: #ff6b6b;
        }

        /* 加载动画 */
        .loading-dots {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* 错误提示 */
        .error-message {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                height: 100%;
                z-index: 1000;
                transition: left 0.3s ease;
                box-shadow: none;
            }
            
            .sidebar.show {
                left: 0;
                box-shadow: 2px 0 20px rgba(0, 0, 0, 0.5);
            }
            
            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 999;
            }
            
            .sidebar-overlay.show {
                display: block;
            }
            
            .mobile-menu-btn {
                display: flex;
            }
            
            .messages-container {
                padding: 16px;
            }
            
            .message {
                max-width: 90%;
            }
        }

        /* 手机端菜单按钮 */
        .mobile-menu-btn {
            display: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--bg-message);
            border: 1px solid var(--border);
            color: var(--text-light);
            font-size: 20px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .mobile-menu-btn:hover {
            background: var(--primary);
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* Markdown 样式 */
        .message.assistant pre {
            background: #0d1117;
            border-radius: 8px;
            padding: 12px 16px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message.assistant code {
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
        }

        .message.assistant p code {
            background: rgba(102, 126, 234, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .message.assistant pre code {
            background: transparent;
            padding: 0;
        }

        .message.assistant ul, .message.assistant ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .message.assistant li {
            margin: 4px 0;
        }

        .message.assistant blockquote {
            border-left: 3px solid var(--primary);
            padding-left: 12px;
            margin: 8px 0;
            color: var(--text-dim);
        }

        .message.assistant table {
            border-collapse: collapse;
            margin: 8px 0;
        }

        .message.assistant th, .message.assistant td {
            border: 1px solid var(--border);
            padding: 8px 12px;
        }

        .message.assistant th {
            background: rgba(102, 126, 234, 0.1);
        }

        .message.assistant h1, .message.assistant h2, .message.assistant h3 {
            margin-top: 16px;
            margin-bottom: 8px;
        }

        .message.assistant h1 { font-size: 1.4em; }
        .message.assistant h2 { font-size: 1.2em; }
        .message.assistant h3 { font-size: 1.1em; }

        .message.assistant p {
            margin: 8px 0;
        }

        .message.assistant a {
            color: var(--primary);
            text-decoration: none;
        }

        .message.assistant a:hover {
            text-decoration: underline;
        }

        /* 用户消息图片样式 */
        .message-image {
            margin-bottom: 8px;
        }

        .message-image img {
            max-width: 200px;
            max-height: 150px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        /* 工具调用提示 */
        .thinking-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            margin: 4px 0;
            font-size: 13px;
            color: #facc15;
            background: rgba(250, 204, 21, 0.08);
            border-radius: 8px;
            animation: think-pulse 2s ease-in-out infinite;
        }
        @keyframes think-pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        .tool-call {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            margin: 3px 0;
            font-size: 13px;
            color: var(--text-dim);
            background: rgba(59, 130, 246, 0.08);
            border-radius: 8px;
            border-left: 3px solid #3b82f6;
        }
        .tool-result {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            margin: 3px 0 3px 16px;
            font-size: 12px;
            color: var(--text-dim);
            background: rgba(34, 197, 94, 0.06);
            border-radius: 8px;
            border-left: 3px solid #22c55e;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .pipeline-step {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            margin: 3px 0;
            font-size: 13px;
            color: var(--text-dim);
            background: rgba(102, 126, 234, 0.04);
            border-radius: 8px;
            border-left: 3px solid #667eea;
            animation: fadeIn 0.3s ease;
        }
        .pipeline-step.done {
            color: #22c55e;
            border-left-color: #22c55e;
        }
        .pipeline-step.clickable {
            cursor: pointer;
            transition: background 0.2s;
        }
        .pipeline-step.clickable:hover {
            background: rgba(102, 126, 234, 0.12);
        }
        .search-count-badge {
            margin-left: auto;
            font-size: 11px;
            padding: 1px 8px;
            border-radius: 10px;
            background: rgba(102, 126, 234, 0.15);
            color: #667eea;
            white-space: nowrap;
        }
        /* 搜索结果弹窗 */
        .search-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        .search-modal {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: min(600px, 90vw);
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .search-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 600;
        }
        .search-modal-header .close-btn {
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 18px;
        }
        .search-modal-header .close-btn:hover {
            background: var(--bg-message);
        }
        .search-modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
            color: var(--text);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reasoning-area {
            margin: 0 0 8px 0;
            border-radius: 10px;
            overflow: hidden;
            max-width: 80%;
        }
        .reasoning-area summary {
            padding: 8px 14px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.25);
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            color: #a78bfa;
            user-select: none;
            transition: background 0.2s;
        }
        .reasoning-area summary:hover {
            background: rgba(139, 92, 246, 0.18);
        }
        .conversation-divider {
            text-align: center;
            padding: 16px 0;
            margin: 12px 0;
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            letter-spacing: 2px;
            user-select: none;
        }
        .reasoning-content {
            background: #0d0d1a;
            border: 1px solid rgba(139, 92, 246, 0.15);
            border-top: none;
            border-radius: 0 0 10px 10px;
            padding: 12px 16px;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.7;
            color: #c4b5fd;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <!-- 手机端侧边栏遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    
    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>对话历史</h2>
            <button class="new-chat-btn" onclick="newChat()" title="新建对话">+</button>
        </div>
        <div class="session-list" id="sessionList">
            <!-- 动态加载 -->
        </div>
    </div>

    <!-- 主聊天区域 -->
    <div class="chat-main">
        <div class="chat-header">
            <button class="mobile-menu-btn" onclick="toggleSidebar()" title="历史会话">☰</button>
            <div style="display: flex; align-items: center;">
                <h1 id="chatTitle">新对话</h1>
                <span class="ws-status" id="wsStatus">
                    <span class="ws-status-dot disconnected" id="wsStatusDot"></span>
                    <span class="ws-status-tooltip" id="wsStatusTooltip">WebSocket 已断开</span>
                </span>
            </div>
            <a href="/" class="back-link">返回主页</a>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="empty-state">
                <h2>👋 你好！</h2>
                <p>我是你的 AI 伙伴，有什么可以帮助你的吗？</p>
            </div>
        </div>

        <div class="input-container">
            <!-- 图片预览区域 -->
            <div class="image-preview-area" id="imagePreviewArea" style="display: none;">
                <div class="image-preview-wrapper">
                    <img id="imagePreview" src="" alt="预览图片">
                    <div id="filePreviewName" style="padding: 10px; font-size: 14px; display: none;"></div>
                    <button class="remove-image-btn" onclick="clearSelectedImage()">✕</button>
                </div>
            </div>
            
            <div class="input-wrapper">
                <textarea 
                    class="input-field" 
                    id="inputField" 
                    placeholder="输入消息..." 
                    rows="1"
                    onkeydown="handleKeydown(event)"
                ></textarea>
                <button class="image-btn" onclick="document.getElementById('imageInput').click()" title="发送图片">📷</button>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
            
            <!-- 隐藏的图片输入 -->
            <input type="file" id="imageInput" style="display: none;" onchange="handleImageSelect(event)">
        </div>
    </div>

    <script>
        // ======== 配置 ========
        const USE_WEBSOCKET = true;  // WebSocket 模式（绕过 CDN 缓冲）
        const WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host + '/api/chat/ws';
        const AGENT_HASH = '{{ agent_hash }}';

        // 状态
        let jwt = null;
        let currentSessionId = null;
        let isStreaming = false;
        let selectedImageBase64 = null;  // 选中的图片 base64 数据
let selectedFileName = null;     // 选中的文件名（非图片文件）
let selectedFilePath = null;     // 上传后的 VFS 路径

        // ======== WebSocket 连接管理器（持久连接 + 自动重连） ========
        const ConnectionManager = {
            ws: null,
            reconnectTimer: null,
            pingCheckTimer: null,
            lastPingTime: 0,
            _pendingSend: null,
            _shuttingDown: false,

            // 消息回调（由 sendMessageWS 注册，done/error 时清除）
            onToken: null,
            onThinking: null,
            onTool: null,
            onToolResult: null,
            onDone: null,
            onError: null,
            onPipeline: null,
            onSearchProgress: null,
            onReasoning: null,

            setStatus(s) {
                const dot = document.getElementById('wsStatusDot');
                const tooltip = document.getElementById('wsStatusTooltip');
                if (!dot) return;
                dot.className = 'ws-status-dot ' + s;
                if (s === 'connected') {
                    tooltip.textContent = 'WebSocket 已连接';
                } else if (s === 'connecting') {
                    tooltip.textContent = '正在重连...';
                } else {
                    tooltip.textContent = 'WebSocket 已断开';
                }
            },

            connect() {
                this._shuttingDown = false;
                if (this.reconnectTimer) { clearTimeout(this.reconnectTimer); this.reconnectTimer = null; }
                if (this.pingCheckTimer) { clearInterval(this.pingCheckTimer); this.pingCheckTimer = null; }

                if (this.ws) {
                    try { this.ws.onclose = null; } catch(e) {}
                    try { this.ws.close(); } catch(e) {}
                    this.ws = null;
                }

                this.setStatus('connecting');

                // 刷新 JWT（可能已过期/更换）
                const token = (typeof Auth !== 'undefined' && Auth.getToken) ? Auth.getToken() : localStorage.getItem('feclaw_jwt');
                if (token) jwt = token;

                const url = WS_URL + '?token=' + encodeURIComponent(jwt) + '&agent_hash=' + encodeURIComponent(AGENT_HASH);
                const self = this;
                const ws = new WebSocket(url);

                ws.onopen = () => {
                    self.lastPingTime = Date.now();
                    self.setStatus('connected');

                    // 发送排队的消息
                    if (self._pendingSend) {
                        const data = self._pendingSend;
                        self._pendingSend = null;
                        self.ws.send(JSON.stringify(data));
                    }

                    self.pingCheckTimer = setInterval(() => {
                        if (Date.now() - self.lastPingTime > 90000) {
                            console.log('Ping timeout, reconnecting...');
                            self._handleDrop();
                        }
                    }, 10000);
                };

                ws.onmessage = (event) => {
                    self.lastPingTime = Date.now();
                    try {
                        const msg = JSON.parse(event.data);
                        if (msg.type === 'ping') return;

                        if (msg.type === 'token' && self.onToken) self.onToken(msg);
                        else if (msg.type === 'divider') {
                            // 在消息区插入分割线（放在最新 AI 消息之前或消息区末尾）
                            const container = document.getElementById('messagesContainer');
                            const lastAi = container.querySelector('.message.assistant:last-child');
                            const div = document.createElement('div');
                            div.className = 'conversation-divider';
                            div.textContent = msg.content || '──── 新对话 ────';
                            container.insertBefore(div, lastAi ? lastAi.nextSibling : null);
                            scrollToBottom();
                        }
                        else if (msg.type === 'thinking' && self.onThinking) self.onThinking(msg);
                        else if (msg.type === 'tool' && self.onTool) self.onTool(msg);
                        else if (msg.type === 'tool_result' && self.onToolResult) self.onToolResult(msg);
                        else if (msg.type === 'done' && self.onDone) self.onDone(msg);
                        else if (msg.type === 'error' && self.onError) self.onError(msg);
                        else if (msg.type === 'pipeline' && self.onPipeline) self.onPipeline(msg);
                        else if (msg.type === 'search_progress' && self.onSearchProgress) self.onSearchProgress(msg);
                        else if (msg.type === 'reasoning' && self.onReasoning) self.onReasoning(msg);
                    } catch (e) {
                        console.error('WS 消息解析失败:', e, event.data);
                    }
                };

                ws.onerror = (err) => {
                    console.error('WebSocket error:', err);
                };

                ws.onclose = () => {
                    self.ws = null;
                    if (self.pingCheckTimer) { clearInterval(self.pingCheckTimer); self.pingCheckTimer = null; }
                    if (!self._shuttingDown) self._handleDrop();
                };

                this.ws = ws;
            },

            _handleDrop() {
                // 如果有排队消息（正在等待重连发送），不触发 onError
                if (this._pendingSend) {
                    this.scheduleReconnect();
                    return;
                }
                if (this.onError) {
                    this.onError({ message: '连接已断开，正在重连...' });
                }
                this.setStatus('connecting');
                this.scheduleReconnect();
            },

            scheduleReconnect() {
                if (this.reconnectTimer) return;
                console.log('WS reconnect in 1s');
                this.setStatus('connecting');
                this.reconnectTimer = setTimeout(() => {
                    this.reconnectTimer = null;
                    this.connect();
                }, 1000);
            },

            send(data) {
                if (!this.ws || this.ws.readyState !== WebSocket.OPEN) {
                    // WS 未就绪，排队等待发送
                    this._pendingSend = data;
                    console.log('WS 未就绪，已排队消息');
                    return false;
                }
                this.ws.send(JSON.stringify(data));
                return true;
            },

            disconnect() {
                this._shuttingDown = true;
                if (this.reconnectTimer) { clearTimeout(this.reconnectTimer); this.reconnectTimer = null; }
                if (this.pingCheckTimer) { clearInterval(this.pingCheckTimer); this.pingCheckTimer = null; }
                this.setStatus('disconnected');
                if (this.ws) {
                    this.ws.onclose = null;
                    this.ws.close(1000);
                    this.ws = null;
                }
            }
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            // 先执行完整 auth 检查（含子域名 SSO sync + token 过期验证）
            if (typeof Auth !== 'undefined') {
                const authOk = await Auth.checkAuthBeforeRender();
                if (!authOk) return;  // checkAuthBeforeRender 已处理跳转
                jwt = Auth.getToken();
            } else {
                jwt = localStorage.getItem('feclaw_jwt');
            }
            if (!jwt) {
                window.location.href = '/login';
                return;
            }

            // 建立持久 WebSocket 连接
            ConnectionManager.connect();

            loadSessions();
            
            // 自动聚焦输入框
            document.getElementById('inputField').focus();
        });

        // 图片选择处理
        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 清理旧状态
            clearSelectedImage();

            if (file.type.startsWith('image/')) {
                // 图片：原有流程（base64 预览 + 发送）
                if (file.size > 5 * 1024 * 1024) {
                    alert('图片大小不能超过 5MB');
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedImageBase64 = e.target.result;
                    document.getElementById('imagePreview').src = selectedImageBase64;
                    document.getElementById('imagePreviewArea').style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else {
                // 非图片文件：上传到 VFS
                if (file.size > 50 * 1024 * 1024) {
                    alert('文件大小不能超过 50MB');
                    return;
                }
                uploadFileToVFS(file);
            }
            event.target.value = '';
        }

        // 上传文件到 Agent VFS
        async function uploadFileToVFS(file) {
            const formData = new FormData();
            formData.append('file', file);
            const path = 'uploads/' + file.name;

            try {
                const resp = await fetch('/api/file/upload?path=' + encodeURIComponent(path), {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${jwt}` },
                    body: formData
                });
                if (!resp.ok) {
                    const err = await resp.text();
                    alert('上传失败: ' + err);
                    return;
                }
                selectedFileName = file.name;
                selectedFilePath = path;
                // 显示文件名称在预览区
                document.getElementById('imagePreview').style.display = 'none';
                document.getElementById('filePreviewName').textContent = '📄 ' + file.name;
                document.getElementById('imagePreviewArea').style.display = 'block';
            } catch (e) {
                alert('上传失败: ' + e.message);
            }
        }

        // 清除选中的图片/文件
        function clearSelectedImage() {
            selectedImageBase64 = null;
            selectedFileName = null;
            selectedFilePath = null;
            document.getElementById('imagePreviewArea').style.display = 'none';
            document.getElementById('imagePreview').src = '';
            document.getElementById('imagePreview').style.display = 'block';
            document.getElementById('filePreviewName').textContent = '';
        }

        // 加载会话列表
        async function loadSessions() {
            try {
                const response = await fetch('/api/chat/sessions', {
                    headers: { 'Authorization': `Bearer ${jwt}` }
                });
                
                if (!response.ok) {
                    if (response.status === 401) {
                        localStorage.removeItem('feclaw_jwt');
                        window.location.href = '/login';
                    }
                    return;
                }
                
                const sessions = await response.json();
                renderSessionList(sessions);
                // 自动加载最近会话
                if (sessions.length > 0 && !currentSessionId) {
                    loadSession(sessions[0].session_id);
                }
            } catch (error) {
                console.error('加载会话列表失败:', error);
            }
        }

        // 渲染会话列表
        function renderSessionList(sessions) {
            const container = document.getElementById('sessionList');
            
            if (sessions.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-dim); font-size: 14px;">暂无对话记录</div>';
                return;
            }
            
            container.innerHTML = sessions.map(session => {
                const preview = session.last_message || session.topic || '新对话';
                const isActive = session.session_id === currentSessionId;
                return `<div class="session-item ${isActive ? 'active' : ''}" data-session-id="${session.session_id}" onclick="loadSessionAndClose('${session.session_id}')">
                    <div class="session-avatar">💬</div>
                    <div class="session-info">
                        <div class="session-title">${escapeHtml(session.topic || '对话')}</div>
                        <div class="session-preview">${escapeHtml(preview.slice(0, 50))}</div>
                        <div class="session-time">${formatDate(session.updated_at)}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteSession(event, '${session.session_id}')">🗑️</button>
                </div>`;
            }).join('');
        }

        // 加载会话
        async function loadSession(sessionId) {
            try {
                const response = await fetch(`/api/chat/sessions/${sessionId}`, {
                    headers: { 'Authorization': `Bearer ${jwt}` }
                });
                
                if (!response.ok) return;
                
                const session = await response.json();
                currentSessionId = session.session_id;
                
                // 更新标题
                document.getElementById('chatTitle').textContent = session.topic || '对话';
                
                // 解析消息（后端存的是 JSON 字符串）
                let messages = session.messages;
                if (typeof messages === 'string') {
                    try { messages = JSON.parse(messages); } catch(e) { messages = []; }
                }
                if (!Array.isArray(messages)) messages = [];
                
                // 渲染消息
                renderMessages(messages);
                
                // 更新侧边栏选中状态
                document.querySelectorAll('.session-item').forEach(el => {
                    el.classList.toggle('active', el.dataset.sessionId === sessionId);
                });
            } catch (error) {
                console.error('加载会话失败:', error);
            }
        }

        // 渲染消息
        function renderMessages(messages) {
            const container = document.getElementById('messagesContainer');
            
            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h2>👋 你好！</h2>
                        <p>我是你的 AI 伙伴，有什么可以帮助你的吗？</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.role}">
                    ${msg.role === 'assistant' ? renderMarkdown(msg.content || '') : escapeHtml(msg.content || '')}
                </div>
            `).join('');
            
            // 渲染 LaTeX 公式
            if (typeof katex !== 'undefined') {
                try {
                    var allMsgs = container.querySelectorAll('.message');
                    for (var mi = 0; mi < allMsgs.length; mi++) {
                        var html = allMsgs[mi].innerHTML;
                        html = html.replace(/\$\$([\s\S]*?)\$\$/g, function(_, eq) {
                            try { return katex.renderToString(eq, {displayMode: true, throwOnError: false}); }
                            catch(e) { return '$$' + eq + '$$'; }
                        });
                        html = html.replace(/\\\[([\s\S]*?)\\\]/g, function(_, eq) {
                            try { return katex.renderToString(eq, {displayMode: true, throwOnError: false}); }
                            catch(e) { return '\\[' + eq + '\\]'; }
                        });
                        html = html.replace(/\$([^$\n]+?)\$/g, function(_, eq) {
                            try { return katex.renderToString(eq, {displayMode: false, throwOnError: false}); }
                            catch(e) { return '$' + eq + '$'; }
                        });
                        html = html.replace(/\\\(([^)]+?)\\\)/g, function(_, eq) {
                            try { return katex.renderToString(eq, {displayMode: false, throwOnError: false}); }
                            catch(e) { return '\\(' + eq + '\\)'; }
                        });
                        allMsgs[mi].innerHTML = html;
                    }
                } catch(e) {}
            }
            
            scrollToBottom();
        }

        // WebSocket 发送消息（使用持久连接）
        async function sendMessageWS() {
            const input = document.getElementById('inputField');
            const content = input.value.trim();

            if ((!content && !selectedImageBase64 && !selectedFilePath) || isStreaming) return;

            // 如果有文件但没有文字，自动添加提示
            const msgContent = (!content && selectedFilePath) ? '请查看并处理这个文件：' + selectedFileName : content;

            // 清空输入
            input.value = '';
            input.style.height = 'auto';

            // 显示用户消息
            appendMessage('user', msgContent, false, selectedImageBase64, selectedFileName);

            const imageData = selectedImageBase64;
            const fileDataPath = selectedFilePath;
            const fileDataName = selectedFileName;
            clearSelectedImage();

            // 显示 AI 消息占位
            const aiMessageEl = appendMessage('assistant', '', true);
            setStreaming(true);

            let fullContent = '';
            let doneReceived = false;

            // 注册回调到持久连接上
            let firstToken = true;
            ConnectionManager.onToken = (msg) => {
                if (firstToken) {
                    firstToken = false;
                    // 移除最后一条流水线步骤（💬 准备生成回答）让位给真实回复
                    const steps = messagesContainer.querySelectorAll('.pipeline-step');
                    if (steps.length > 0) steps[steps.length - 1].remove();
                }
                fullContent += msg.content || '';
                updateMessage(aiMessageEl, fullContent);
            };

            ConnectionManager.onThinking = (msg) => {
                const thinkEl = document.createElement('div');
                thinkEl.className = 'thinking-indicator';
                thinkEl.textContent = '\u{1F914} ' + (msg.content || '思考中...');
                document.getElementById('messagesContainer').appendChild(thinkEl);
            };

            ConnectionManager.onTool = (msg) => {
                // 在 AI 消息气泡内部插入工具调用（inline），而非外部
                _insertBeforeAiMessage(aiMessageEl, '\u{1F527} ' + escapeHtml(msg.tool_name || msg.content || '执行工具'), 'tool-call');
            };

            ConnectionManager.onToolResult = (msg) => {
                const resultText = msg.content || '';
                const preview = resultText.length > 100 ? resultText.slice(0, 100) + '...' : resultText;
                _insertBeforeAiMessage(aiMessageEl, '\u2705 ' + escapeHtml(preview), 'tool-result');
            };

            // 在 AI 消息之前插入 inline 元素（工具调用/结果）
            function _insertBeforeAiMessage(anchor, html, className) {
                const el = document.createElement('div');
                el.className = className;
                el.innerHTML = html;
                document.getElementById('messagesContainer').insertBefore(el, anchor);
                scrollToBottom();
            }

            // 流水线状态 — 在消息区域流式显示处理步骤
            ConnectionManager.onPipeline = (msg) => {
                const text = msg.content || '';
                const isDone = text.startsWith('✅');
                const isSearch = text.startsWith('🔍');

                // ✅ 完成：找到匹配的 🔍 搜索步骤，替换其内容，而不是新建
                if (isDone && msg.query) {
                    const existing = document.querySelector(`.pipeline-step[data-query="${msg.query.slice(0, 40).replace(/["\\]/g, '\\$&')}"]:not(.done)`);
                    if (existing) {
                        existing.textContent = text;
                        existing.classList.add('done');
                        existing.dataset.query = '';
                        // 如果有结果预览，挂点击弹窗
                        if (msg.result_preview) {
                            _attachResultModal(existing, msg.query || msg.tool, msg.result_preview);
                        }
                        scrollToBottom();
                        return;
                    }
                }

                const stepEl = document.createElement('div');
                stepEl.className = 'pipeline-step';
                if (isDone) stepEl.classList.add('done');

                // 搜索步骤（🔍）：提取查询关键词存入 dataset
                if (isSearch) {
                    const m = text.match(/: (.+?)\.\.\.$/);
                    if (m) stepEl.dataset.query = m[1];
                }

                // 有结果预览的步骤 → 可点击弹窗
                if (isDone && msg.result_preview) {
                    _attachResultModal(stepEl, msg.query || msg.tool || text, msg.result_preview);
                }

                stepEl.textContent = text;
                document.getElementById('messagesContainer').insertBefore(stepEl, aiMessageEl);
                scrollToBottom();
            };

            // 给 pipeline 步骤挂载结果查看弹窗
            function _attachResultModal(el, title, content) {
                el.classList.add('clickable');
                el.addEventListener('click', function() {
                    removeSearchModal();
                    const overlay = document.createElement('div');
                    overlay.className = 'search-modal-overlay';
                    const body = document.createElement('div');
                    body.className = 'search-modal-body';
                    body.innerHTML = renderMarkdown(content);
                    overlay.innerHTML = `
                        <div class="search-modal">
                            <div class="search-modal-header">
                                <span>📄 结果：${escapeHtml(title || '')}</span>
                                <button class="close-btn">✕</button>
                            </div>
                        </div>
                    `;
                    overlay.querySelector('.search-modal').appendChild(body);
                    overlay.querySelector('.close-btn').onclick = removeSearchModal;
                    overlay.onclick = function(e) { if (e.target === overlay) removeSearchModal(); };
                    document.body.appendChild(overlay);
                    _activeSearchModal = overlay;
                });
            }

            // 搜索流式内容 — 不直接显示，攒到 map 里并更新对应 step 上的字数徽标
            const _searchContents = {};  // { query: accumulated_text }
            const _searchModalRefs = {}; // { query: modal_body_element }
            ConnectionManager.onSearchProgress = (msg) => {
                const query = msg.query || '';
                const tool = msg.tool || 'web_search';
                const text = msg.content || '';
                if (!query) return;

                // 累积内容
                if (!_searchContents[query]) _searchContents[query] = '';
                _searchContents[query] += text;
                const totalChars = _searchContents[query].length;

                // 如果该搜索的弹窗已打开，实时更新内容
                if (_searchModalRefs[query]) {
                    _searchModalRefs[query].innerHTML = renderMarkdown(_searchContents[query]);
                    _searchModalRefs[query].scrollTop = _searchModalRefs[query].scrollHeight;
                }

                // 找到对应的 pipeline step
                let step = null;
                const _q = query.slice(0, 40).replace(/["\\]/g, '\\$&');
                step = document.querySelector(`.pipeline-step[data-query="${_q}"]:not(.done)`);
                // 后备：前缀匹配（data-query 是截断版 query[:40]，SSE 发的是完整 query）
                if (!step && query.length > 40) {
                    for (const s of document.querySelectorAll('.pipeline-step:not(.done)[data-query]')) {
                        if (query.startsWith(s.dataset.query)) {
                            step = s;
                            step.dataset.query = query;  // 修复为完整 query
                            break;
                        }
                    }
                }
                if (!step) return;

                // 挂载点击事件（打开弹窗）
                step.classList.add('clickable');
                if (!step._searchQuery) {
                    step._searchQuery = query;
                    step.addEventListener('click', function() {
                        showSearchModal(this._searchQuery);
                    });
                }
                // 更新/添加字数 badge
                let badge = step.querySelector('.search-count-badge');
                if (!badge) {
                    badge = document.createElement('span');
                    badge.className = 'search-count-badge';
                    step.appendChild(badge);
                }
                badge.textContent = `📝 ${totalChars}字`;
                if (step) {
                    step.classList.add('clickable');
                    if (!step._searchQuery) {
                        step._searchQuery = query;
                        step.addEventListener('click', function() {
                            showSearchModal(this._searchQuery);
                        });
                    }
                    // 更新/添加字数 badge
                    let badge = step.querySelector('.search-count-badge');
                    if (!badge) {
                        badge = document.createElement('span');
                        badge.className = 'search-count-badge';
                        step.appendChild(badge);
                    }
                    badge.textContent = `📝 ${totalChars}字`;
                }
            };

            // 搜索内容弹窗
            let _activeSearchModal = null; // 当前打开的弹窗 overlay
            function showSearchModal(query) {
                removeSearchModal();
                const content = _searchContents[query] || '';
                const overlay = document.createElement('div');
                overlay.className = 'search-modal-overlay';
                const body = document.createElement('div');
                body.className = 'search-modal-body';
                body.innerHTML = renderMarkdown(content);
                overlay.innerHTML = `
                    <div class="search-modal">
                        <div class="search-modal-header">
                            <span>🔍 搜索结果：${escapeHtml(query || '')}</span>
                            <button class="close-btn">✕</button>
                        </div>
                    </div>
                `;
                overlay.querySelector('.search-modal').appendChild(body);
                overlay.querySelector('.close-btn').onclick = removeSearchModal;
                overlay.onclick = function(e) { if (e.target === overlay) removeSearchModal(); };
                document.body.appendChild(overlay);
                _activeSearchModal = overlay;
                _searchModalRefs[query] = body;
            }
            function removeSearchModal() {
                Object.keys(_searchModalRefs).forEach(k => delete _searchModalRefs[k]);
                if (_activeSearchModal) {
                    _activeSearchModal.remove();
                    _activeSearchModal = null;
                }
            }

            // 深度思考推理过程（可折叠）
            let reasoningArea = null;
            let reasoningContent = null;
            ConnectionManager.onReasoning = (msg) => {
                if (!reasoningArea) {
                    reasoningArea = document.createElement('details');
                    reasoningArea.className = 'reasoning-area';
                    reasoningArea.open = true;
                    const summary = document.createElement('summary');
                    summary.textContent = '🧠 深度思考中...';
                    reasoningArea.appendChild(summary);
                    reasoningContent = document.createElement('div');
                    reasoningContent.className = 'reasoning-content';
                    reasoningArea.appendChild(reasoningContent);
                    document.getElementById('messagesContainer').insertBefore(reasoningArea, aiMessageEl);
                }
                reasoningContent.textContent += (msg.content || '');
                reasoningArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            };

            ConnectionManager.onDone = (msg) => {
                doneReceived = true;
                // 关闭推理区域
                if (reasoningArea && reasoningArea.open) {
                    const summary = reasoningArea.querySelector('summary');
                    if (summary) summary.textContent = '🧠 深度思考（已完成）';
                }
                currentSessionId = msg.session_id;
                removeCursor(aiMessageEl);
                loadSessions();
                cleanup();
            };

            ConnectionManager.onError = (msg) => {
                if (doneReceived) return;
                showError(msg.message || '发送失败');
                aiMessageEl.remove();
                cleanup();
            };

            function cleanup() {
                setStreaming(false);
                ConnectionManager.onToken = null;
                ConnectionManager.onThinking = null;
                ConnectionManager.onTool = null;
                ConnectionManager.onToolResult = null;
                ConnectionManager.onDone = null;
                ConnectionManager.onError = null;
                ConnectionManager.onPipeline = null;
                ConnectionManager.onReasoning = null;
            }

            const sent = ConnectionManager.send({
                content: msgContent,
                session_id: currentSessionId,
                image_url: imageData,
                file_path: fileDataPath,
                file_name: fileDataName
            });

            if (!sent) {
                // send() 会自动排队，等 WS 就绪后发送
            }
        }

        // 发送消息
        async function sendMessage() {
            if (USE_WEBSOCKET) {
                return sendMessageWS();
            }

            const input = document.getElementById('inputField');
            const content = input.value.trim();
            
            console.log('[sendMessage] content:', content, 'image:', selectedImageBase64 ? 'yes' : 'no', 'file:', selectedFileName, 'isStreaming:', isStreaming);
            
            // 如果没有内容且没有图片也没有文件，不发送
            if ((!content && !selectedImageBase64 && !selectedFilePath) || isStreaming) return;

            // 如果有文件但没有文字，自动添加提示
            const msgContent = (!content && selectedFilePath) ? '请查看并处理这个文件：' + selectedFileName : content;
            
            // 清空输入
            input.value = '';
            input.style.height = 'auto';
            
            // 显示用户消息（如果有图片，显示图片预览）
            const userMessageEl = appendMessage('user', msgContent, false, selectedImageBase64, selectedFileName);
            
            // 保存数据用于发送
            const imageData = selectedImageBase64;
            const fileDataPath = selectedFilePath;
            const fileDataName = selectedFileName;
            
            // 清除选中的图片/文件
            clearSelectedImage();
            
            // 显示 AI 消息占位
            const aiMessageEl = appendMessage('assistant', '', true);
            
            // 禁用发送按钮
            setStreaming(true);
            
            try {
                console.log('[sendMessage] Sending request...', 'content:', msgContent, 'hasImage:', !!imageData, 'hasFile:', !!fileDataPath);
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${jwt}`,
                        'Content-Type': 'application/json',
                        'Accept': 'text/event-stream'
                    },
                    body: JSON.stringify({
                        content: msgContent || '',
                        session_id: currentSessionId,
                        image_url: imageData,  // 包含图片数据
                        file_path: fileDataPath,
                        file_name: fileDataName
                    })
                });
                
                console.log('[sendMessage] Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                // 检查是否支持 ReadableStream
                if (!response.body || !response.body.getReader) {
                    // 不支持流式，直接读取全部内容
                    setStreaming(false);
                    throw new Error('浏览器不支持流式读取');
                }
                
                // 读取流
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullContent = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    
                    // 解析 SSE 事件（按双换行分割）
                    const events = buffer.split('\n\n');
                    buffer = events.pop() || '';

                    for (const eventStr of events) {
                        const lines = eventStr.split('\n');
                        let eventType = '';
                        let dataStr = '';

                        for (const line of lines) {
                            if (line.startsWith('event: ')) {
                                eventType = line.slice(7);
                            } else if (line.startsWith('data: ')) {
                                dataStr = line.slice(6);
                            }
                        }
                        
                        if (!dataStr) continue;
                        
                        // 每个事件处理前让出给浏览器渲染
                        await new Promise(r => setTimeout(r, 0));
                        
                        try {
                            const data = JSON.parse(dataStr);
                            
                            if (eventType === 'token' && data.content) {
                                fullContent += data.content;
                                updateMessage(aiMessageEl, fullContent);
                                // 让出控制权给浏览器，及时渲染每个 token
                                await new Promise(r => setTimeout(r, 0));
                            }
                            
                            if (eventType === 'thinking') {
                                // Agent 思考中，显示思考提示
                                const thinkEl = document.createElement('div');
                                thinkEl.className = 'thinking-indicator';
                                thinkEl.textContent = '🤔 ' + (data.content || '思考中...');
                                document.getElementById('messagesContainer').appendChild(thinkEl);
                            }
                            
                            if (eventType === 'tool') {
                                // 工具调用
                                const toolEl = document.createElement('div');
                                toolEl.className = 'tool-call';
                                toolEl.innerHTML = '🔧 ' + escapeHtml(data.tool_name || data.content || '执行工具');
                                document.getElementById('messagesContainer').appendChild(toolEl);
                                scrollToBottom();
                            }
                            
                            if (eventType === 'tool_result') {
                                // 工具执行结果
                                const resultEl = document.createElement('div');
                                resultEl.className = 'tool-result';
                                const resultText = data.content || '';
                                const preview = resultText.length > 100 ? resultText.slice(0, 100) + '...' : resultText;
                                resultEl.innerHTML = '✅ ' + escapeHtml(preview);
                                document.getElementById('messagesContainer').appendChild(resultEl);
                                scrollToBottom();
                            }
                            
                            if (eventType === 'pipeline') {
                                // 流水线状态
                                const text = data.content || '';
                                if (text.startsWith('🤔')) {
                                    const stepEl = document.createElement('div');
                                    stepEl.className = 'pipeline-step';
                                    stepEl.textContent = text;
                                    document.getElementById('messagesContainer').appendChild(stepEl);
                                } else if (text.startsWith('✅')) {
                                    const existing = document.getElementById('messagesContainer').querySelectorAll('.pipeline-step');
                                    const stepEl = document.createElement('div');
                                    stepEl.className = 'pipeline-step done';
                                    stepEl.textContent = text;
                                    document.getElementById('messagesContainer').appendChild(stepEl);
                                }
                                scrollToBottom();
                            }

                            if (eventType === 'reasoning') {
                                // 深度思考推理过程
                                let rsnArea = document.getElementById('reasoningArea');
                                if (!rsnArea) {
                                    rsnArea = document.createElement('details');
                                    rsnArea.id = 'reasoningArea';
                                    rsnArea.className = 'reasoning-area';
                                    rsnArea.open = true;
                                    const summary = document.createElement('summary');
                                    summary.textContent = '🧠 深度思考中...';
                                    rsnArea.appendChild(summary);
                                    const rsnContent = document.createElement('div');
                                    rsnContent.id = 'reasoningContent';
                                    rsnContent.className = 'reasoning-content';
                                    rsnArea.appendChild(rsnContent);
                                    document.getElementById('messagesContainer').appendChild(rsnArea);
                                }
                                const rsnContent = document.getElementById('reasoningContent');
                                if (rsnContent) rsnContent.textContent += (data.content || '');
                            }

                            if (eventType === 'done') {
                                currentSessionId = data.session_id;
                                // 关闭推理区域
                                const rsnArea = document.getElementById('reasoningArea');
                                if (rsnArea && rsnArea.open) {
                                    const summary = rsnArea.querySelector('summary');
                                    if (summary) summary.textContent = '🧠 深度思考（已完成）';
                                }
                            }

                            if (eventType === 'error') {
                                showError(data.message || '发送失败');
                                aiMessageEl.remove();
                            }
                        } catch (e) {
                            console.error('解析 SSE 失败:', e, dataStr);
                        }
                    }
                }
                
                // 移除光标
                removeCursor(aiMessageEl);
                
                // 刷新会话列表
                loadSessions();
                
            } catch (error) {
                console.error('发送消息失败:', error);
                showError('发送失败，请重试');
                aiMessageEl.remove();
            } finally {
                setStreaming(false);
            }
        }

        // 追加消息
        function appendMessage(role, content, withCursor = false, imageUrl = null, fileName = null) {
            const container = document.getElementById('messagesContainer');
            
            // 移除空状态
            const emptyState = container.querySelector('.empty-state');
            if (emptyState) emptyState.remove();
            
            const el = document.createElement('div');
            el.className = `message ${role}`;
            
            let messageContent = '';
            
            // 如果是用户消息且有图片，显示图片预览
            if (role === 'user' && imageUrl) {
                messageContent += `<div class="message-image"><img src="${imageUrl}" alt="发送的图片"></div>`;
            }
            // 如果是用户消息且有文件名（非图片文件）
            if (role === 'user' && fileName) {
                messageContent += `<div class="message-file">📄 ${escapeHtml(fileName)}</div>`;
            }
            
            // 添加文本内容
            messageContent += (role === 'assistant' ? renderMarkdown(content) : escapeHtml(content));
            
            // 如果有光标，添加光标
            messageContent += (withCursor ? '<span class="typing-cursor"></span>' : '');
            
            el.innerHTML = messageContent;
            container.appendChild(el);
            
            scrollToBottom();
            return el;
        }

        // 更新消息内容
        function updateMessage(el, content) {
            const cursor = el.querySelector('.typing-cursor');
            const isAssistant = el.classList.contains('assistant');
            el.innerHTML = isAssistant ? renderMarkdown(content) : escapeHtml(content);
            // 渲染 LaTeX 公式（使用 katex.renderToString 正则替换）
            if (typeof katex !== 'undefined') {
                try {
                    var html = el.innerHTML;
                    // 块公式 $$...$$ 或 \[...\]
                    html = html.replace(/\$\$([\s\S]*?)\$\$/g, function(_, eq) {
                        try { return katex.renderToString(eq, {displayMode: true, throwOnError: false}); }
                        catch(e) { return '$$' + eq + '$$'; }
                    });
                    html = html.replace(/\\\[([\s\S]*?)\\\]/g, function(_, eq) {
                        try { return katex.renderToString(eq, {displayMode: true, throwOnError: false}); }
                        catch(e) { return '\\[' + eq + '\\]'; }
                    });
                    // 行内公式 $...$ 或 \(...\)
                    html = html.replace(/\$([^$\n]+?)\$/g, function(_, eq) {
                        try { return katex.renderToString(eq, {displayMode: false, throwOnError: false}); }
                        catch(e) { return '$' + eq + '$'; }
                    });
                    html = html.replace(/\\\(([^)]+?)\\\)/g, function(_, eq) {
                        try { return katex.renderToString(eq, {displayMode: false, throwOnError: false}); }
                        catch(e) { return '\\(' + eq + '\\)'; }
                    });
                    el.innerHTML = html;
                } catch(e) {}
            }
            if (cursor) el.appendChild(cursor);
            scrollToBottom();
        }

        // 移除光标
        function removeCursor(el) {
            const cursor = el.querySelector('.typing-cursor');
            if (cursor) cursor.remove();
        }

        // 显示错误
        function showError(message) {
            const container = document.getElementById('messagesContainer');
            const el = document.createElement('div');
            el.className = 'error-message';
            el.textContent = message;
            container.appendChild(el);
            scrollToBottom();
        }

        // 设置流式状态
        function setStreaming(streaming) {
            isStreaming = streaming;
            document.getElementById('sendBtn').disabled = streaming;
        }

        // 滚动到底部
        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }

        // 新建对话
        function newChat() {
            currentSessionId = null;
            document.getElementById('chatTitle').textContent = '新对话';
            document.getElementById('messagesContainer').innerHTML = `
                <div class="empty-state">
                    <h2>👋 你好！</h2>
                    <p>我是你的 AI 伙伴，有什么可以帮助你的吗？</p>
                </div>
            `;
            
            // 更新侧边栏选中状态
            document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
            
            // 手机端关闭侧边栏
            closeSidebar();
        }

        // 手机端侧边栏切换
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('show');
            overlay.classList.toggle('show');
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.remove('show');
            overlay.classList.remove('show');
        }

        // 加载会话后关闭侧边栏（仅手机端）
        function loadSessionAndClose(sessionId) {
            loadSession(sessionId);
            if (window.innerWidth <= 768) {
                closeSidebar();
            }
        }

        // 删除会话
        async function deleteSession(event, sessionId) {
            event.stopPropagation();
            
            if (!confirm('确定删除这个对话？')) return;
            
            try {
                await fetch(`/api/chat/sessions/${sessionId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${jwt}` }
                });
                
                loadSessions();
                
                if (currentSessionId === sessionId) {
                    newChat();
                }
            } catch (error) {
                console.error('删除会话失败:', error);
            }
        }

        // 键盘事件
        function handleKeydown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '';
            
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} 分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)} 小时前`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)} 天前`;
            
            return date.toLocaleDateString('zh-CN');
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Markdown 渲染（用于 assistant 消息）
        function renderMarkdown(text) {
            if (!text) return '';
            try {
                return marked.parse(text, { breaks: true, gfm: true });
            } catch(e) {
                console.error('renderMarkdown error:', e);
                return escapeHtml(text);
            }
        }

        // 自动调整输入框高度
        const inputField = document.getElementById('inputField');
        inputField.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });
    </script>
</body>
