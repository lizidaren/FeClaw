<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeClaw Chat</title>
    <script src="/static/js/auth.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Markdown & Code Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- KaTeX for math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --secondary: #764ba2;
            --bg-dark: #0a0a1a;
            --bg-chat: #0f0f23;
            --bg-message: #1a1a2e;
            --bg-input: #12122a;
            --text-light: #e0e0e0;
            --text-dim: #888;
            --text-muted: #666;
            --border: rgba(102, 126, 234, 0.2);
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: var(--bg-chat);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .new-chat-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--gradient);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .new-chat-btn:hover {
            transform: scale(1.1);
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .session-item {
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: background 0.2s;
        }

        .session-item:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .session-item.active {
            background: rgba(102, 126, 234, 0.2);
        }

        .session-item .title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-item .meta {
            font-size: 12px;
            color: var(--text-dim);
        }

        .session-item .delete-btn {
            float: right;
            opacity: 0;
            transition: opacity 0.2s;
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 14px;
        }

        .session-item:hover .delete-btn {
            opacity: 1;
        }

        .session-item .delete-btn:hover {
            color: #ff6b6b;
        }

        /* 主聊天区域 */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .back-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        /* 消息区域 */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 15px;
        }

        .message.user {
            background: var(--gradient);
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }

        .message.assistant {
            background: var(--bg-message);
            align-self: flex-start;
            border-bottom-left-radius: 6px;
        }

        .message .typing-cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background: var(--primary);
            margin-left: 2px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state h2 {
            font-size: 24px;
            margin-bottom: 12px;
            color: var(--text-light);
        }

        .empty-state p {
            font-size: 15px;
        }

        /* 输入区域 */
        .input-container {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            background: var(--bg-input);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            background: var(--bg-message);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 18px;
            color: var(--text-light);
            font-size: 15px;
            font-family: inherit;
            resize: none;
            min-height: 50px;
            max-height: 150px;
            line-height: 1.5;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            background: var(--gradient);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, opacity 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 图片按钮 */
        .image-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--bg-message);
            border: 1px solid var(--border);
            color: var(--text-light);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .image-btn:hover {
            background: var(--primary);
        }

        /* 图片预览区域 */
        .image-preview-area {
            padding: 10px 0;
        }

        .image-preview-wrapper {
            display: inline-flex;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            max-width: 200px;
        }

        .image-preview-wrapper img {
            max-width: 200px;
            max-height: 150px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .remove-image-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 24px;
            height: 24px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remove-image-btn:hover {
            background: #ff6b6b;
        }

        /* 加载动画 */
        .loading-dots {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* 错误提示 */
        .error-message {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                height: 100%;
                z-index: 1000;
                transition: left 0.3s ease;
                box-shadow: none;
            }
            
            .sidebar.show {
                left: 0;
                box-shadow: 2px 0 20px rgba(0, 0, 0, 0.5);
            }
            
            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 999;
            }
            
            .sidebar-overlay.show {
                display: block;
            }
            
            .mobile-menu-btn {
                display: flex;
            }
            
            .messages-container {
                padding: 16px;
            }
            
            .message {
                max-width: 90%;
            }
        }

        /* 手机端菜单按钮 */
        .mobile-menu-btn {
            display: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--bg-message);
            border: 1px solid var(--border);
            color: var(--text-light);
            font-size: 20px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .mobile-menu-btn:hover {
            background: var(--primary);
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* Markdown 样式 */
        .message.assistant pre {
            background: #0d1117;
            border-radius: 8px;
            padding: 12px 16px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message.assistant code {
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
        }

        .message.assistant p code {
            background: rgba(102, 126, 234, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .message.assistant pre code {
            background: transparent;
            padding: 0;
        }

        .message.assistant ul, .message.assistant ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .message.assistant li {
            margin: 4px 0;
        }

        .message.assistant blockquote {
            border-left: 3px solid var(--primary);
            padding-left: 12px;
            margin: 8px 0;
            color: var(--text-dim);
        }

        .message.assistant table {
            border-collapse: collapse;
            margin: 8px 0;
        }

        .message.assistant th, .message.assistant td {
            border: 1px solid var(--border);
            padding: 8px 12px;
        }

        .message.assistant th {
            background: rgba(102, 126, 234, 0.1);
        }

        .message.assistant h1, .message.assistant h2, .message.assistant h3 {
            margin-top: 16px;
            margin-bottom: 8px;
        }

        .message.assistant h1 { font-size: 1.4em; }
        .message.assistant h2 { font-size: 1.2em; }
        .message.assistant h3 { font-size: 1.1em; }

        .message.assistant p {
            margin: 8px 0;
        }

        .message.assistant a {
            color: var(--primary);
            text-decoration: none;
        }

        .message.assistant a:hover {
            text-decoration: underline;
        }

        /* 用户消息图片样式 */
        .message-image {
            margin-bottom: 8px;
        }

        .message-image img {
            max-width: 200px;
            max-height: 150px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <!-- 手机端侧边栏遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    
    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>对话历史</h2>
            <button class="new-chat-btn" onclick="newChat()" title="新建对话">+</button>
        </div>
        <div class="session-list" id="sessionList">
            <!-- 动态加载 -->
        </div>
    </div>

    <!-- 主聊天区域 -->
    <div class="chat-main">
        <div class="chat-header">
            <button class="mobile-menu-btn" onclick="toggleSidebar()" title="历史会话">☰</button>
            <h1 id="chatTitle">新对话</h1>
            <a href="/" class="back-link">返回主页</a>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="empty-state">
                <h2>👋 你好！</h2>
                <p>我是你的 AI 伙伴，有什么可以帮助你的吗？</p>
            </div>
        </div>

        <div class="input-container">
            <!-- 图片预览区域 -->
            <div class="image-preview-area" id="imagePreviewArea" style="display: none;">
                <div class="image-preview-wrapper">
                    <img id="imagePreview" src="" alt="预览图片">
                    <button class="remove-image-btn" onclick="clearSelectedImage()">✕</button>
                </div>
            </div>
            
            <div class="input-wrapper">
                <textarea 
                    class="input-field" 
                    id="inputField" 
                    placeholder="输入消息..." 
                    rows="1"
                    onkeydown="handleKeydown(event)"
                ></textarea>
                <button class="image-btn" onclick="document.getElementById('imageInput').click()" title="发送图片">📷</button>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
            
            <!-- 隐藏的图片输入 -->
            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageSelect(event)">
        </div>
    </div>

    <script>
        // ======== 配置 ========
        const USE_WEBSOCKET = false;  // 改为 true 启用 WebSocket（CDN 需要配置支持）
        const WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host + '/api/chat/ws';

        // 状态
        let jwt = null;
        let currentSessionId = null;
        let isStreaming = false;
        let selectedImageBase64 = null;  // 选中的图片 base64 数据

        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            // 先执行完整 auth 检查（含子域名 SSO sync + token 过期验证）
            if (typeof Auth !== 'undefined') {
                const authOk = await Auth.checkAuthBeforeRender();
                if (!authOk) return;  // checkAuthBeforeRender 已处理跳转
                jwt = Auth.getToken();
            } else {
                jwt = localStorage.getItem('feclaw_jwt');
            }
            if (!jwt) {
                window.location.href = '/login';
                return;
            }
            
            loadSessions();
            
            // 自动聚焦输入框
            document.getElementById('inputField').focus();
        });

        // 图片选择处理
        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // 检查文件类型
            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件');
                return;
            }
            
            // 检查文件大小（限制 5MB）
            if (file.size > 5 * 1024 * 1024) {
                alert('图片大小不能超过 5MB');
                return;
            }
            
            // 读取文件并转换为 base64
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImageBase64 = e.target.result;
                
                // 显示预览
                document.getElementById('imagePreview').src = selectedImageBase64;
                document.getElementById('imagePreviewArea').style.display = 'block';
            };
            reader.readAsDataURL(file);
            
            // 清空 file input，允许重复选择同一文件
            event.target.value = '';
        }

        // 清除选中的图片
        function clearSelectedImage() {
            selectedImageBase64 = null;
            document.getElementById('imagePreviewArea').style.display = 'none';
            document.getElementById('imagePreview').src = '';
        }

        // 加载会话列表
        async function loadSessions() {
            try {
                const response = await fetch('/api/chat/sessions', {
                    headers: { 'Authorization': `Bearer ${jwt}` }
                });
                
                if (!response.ok) {
                    if (response.status === 401) {
                        localStorage.removeItem('feclaw_jwt');
                        window.location.href = '/login';
                    }
                    return;
                }
                
                const sessions = await response.json();
                renderSessionList(sessions);
            } catch (error) {
                console.error('加载会话列表失败:', error);
            }
        }

        // 渲染会话列表
        function renderSessionList(sessions) {
            const container = document.getElementById('sessionList');
            
            if (sessions.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-dim); font-size: 14px;">暂无对话记录</div>';
                return;
            }
            
            container.innerHTML = sessions.map(session => `
                <div class="session-item ${session.session_id === currentSessionId ? 'active' : ''}" 
                     onclick="loadSessionAndClose('${session.session_id}')">
                    <button class="delete-btn" onclick="deleteSession(event, '${session.session_id}')">🗑️</button>
                    <div class="title">${session.last_message || '新对话'}</div>
                    <div class="meta">${session.message_count} 条消息 · ${formatDate(session.updated_at)}</div>
                </div>
            `).join('');
        }

        // 加载会话
        async function loadSession(sessionId) {
            try {
                const response = await fetch(`/api/chat/sessions/${sessionId}`, {
                    headers: { 'Authorization': `Bearer ${jwt}` }
                });
                
                if (!response.ok) return;
                
                const session = await response.json();
                currentSessionId = session.session_id;
                
                // 更新标题
                document.getElementById('chatTitle').textContent = session.topic || '对话';
                
                // 渲染消息
                renderMessages(session.messages);
                
                // 更新侧边栏选中状态
                document.querySelectorAll('.session-item').forEach(el => {
                    el.classList.toggle('active', el.onclick.toString().includes(sessionId));
                });
            } catch (error) {
                console.error('加载会话失败:', error);
            }
        }

        // 渲染消息
        function renderMessages(messages) {
            const container = document.getElementById('messagesContainer');
            
            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h2>👋 你好！</h2>
                        <p>我是你的 AI 伙伴，有什么可以帮助你的吗？</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.role}">
                    ${msg.role === 'assistant' ? renderMarkdown(msg.content) : escapeHtml(msg.content)}
                </div>
            `).join('');
            
            // 渲染 LaTeX 公式
            if (typeof katex !== 'undefined') {
                try {
                    var allMsgs = container.querySelectorAll('.message');
                    for (var mi = 0; mi < allMsgs.length; mi++) {
                        var html = allMsgs[mi].innerHTML;
                        html = html.replace(/\$\$([\s\S]*?)\$\$/g, function(_, eq) {
                            try { return katex.renderToString(eq, {displayMode: true, throwOnError: false}); }
                            catch(e) { return '$$' + eq + '$$'; }
                        });
                        html = html.replace(/\\\[([\s\S]*?)\\\]/g, function(_, eq) {
                            try { return katex.renderToString(eq, {displayMode: true, throwOnError: false}); }
                            catch(e) { return '\\[' + eq + '\\]'; }
                        });
                        html = html.replace(/\$([^$\n]+?)\$/g, function(_, eq) {
                            try { return katex.renderToString(eq, {displayMode: false, throwOnError: false}); }
                            catch(e) { return '$' + eq + '$'; }
                        });
                        html = html.replace(/\\\(([^)]+?)\\\)/g, function(_, eq) {
                            try { return katex.renderToString(eq, {displayMode: false, throwOnError: false}); }
                            catch(e) { return '\\(' + eq + '\\)'; }
                        });
                        allMsgs[mi].innerHTML = html;
                    }
                } catch(e) {}
            }
            
            scrollToBottom();
        }

        // WebSocket 发送消息
        async function sendMessageWS() {
            const input = document.getElementById('inputField');
            const content = input.value.trim();

            // 如果没有内容且没有图片，不发送
            if ((!content && !selectedImageBase64) || isStreaming) return;

            // 清空输入
            input.value = '';
            input.style.height = 'auto';

            // 显示用户消息
            appendMessage('user', content, false, selectedImageBase64);

            // 保存图片数据用于发送
            const imageData = selectedImageBase64;

            // 清除选中的图片
            clearSelectedImage();

            // 显示 AI 消息占位
            const aiMessageEl = appendMessage('assistant', '', true);

            // 禁用发送按钮
            setStreaming(true);

            let ws = null;
            let fullContent = '';
            let retries = 0;
            let doneReceived = false;
            const MAX_RETRIES = 3;

            function connect() {
                return new Promise((resolve, reject) => {
                    const url = WS_URL + '?token=' + encodeURIComponent(jwt);
                    ws = new WebSocket(url);

                    ws.onopen = () => {
                        retries = 0;
                        ws.send(JSON.stringify({
                            content: content || '',
                            session_id: currentSessionId,
                            image_url: imageData
                        }));
                    };

                    ws.onmessage = (event) => {
                        try {
                            const msg = JSON.parse(event.data);

                            if (msg.type === 'token') {
                                fullContent += msg.content || '';
                                updateMessage(aiMessageEl, fullContent);
                            } else if (msg.type === 'thinking') {
                                const thinkEl = document.createElement('div');
                                thinkEl.className = 'thinking-indicator';
                                thinkEl.textContent = '🤔 ' + (msg.content || '思考中...');
                                document.getElementById('messagesContainer').appendChild(thinkEl);
                            } else if (msg.type === 'tool') {
                                const toolEl = document.createElement('div');
                                toolEl.className = 'tool-call';
                                toolEl.innerHTML = '🔧 ' + escapeHtml(msg.tool_name || msg.content || '执行工具');
                                document.getElementById('messagesContainer').appendChild(toolEl);
                                scrollToBottom();
                            } else if (msg.type === 'tool_result') {
                                const resultEl = document.createElement('div');
                                resultEl.className = 'tool-result';
                                const resultText = msg.content || '';
                                const preview = resultText.length > 100 ? resultText.slice(0, 100) + '...' : resultText;
                                resultEl.innerHTML = '✅ ' + escapeHtml(preview);
                                document.getElementById('messagesContainer').appendChild(resultEl);
                                scrollToBottom();
                            } else if (msg.type === 'done') {
                                doneReceived = true;
                                currentSessionId = msg.session_id;
                                removeCursor(aiMessageEl);
                                loadSessions();
                                cleanup();
                                resolve();
                            } else if (msg.type === 'error') {
                                showError(msg.message || '发送失败');
                                aiMessageEl.remove();
                                cleanup();
                                reject(new Error(msg.message));
                            }
                            // ping 忽略
                        } catch (e) {
                            console.error('WS 消息解析失败:', e, event.data);
                        }
                    };

                    ws.onerror = (err) => {
                        console.error('WebSocket error:', err);
                    };

                    ws.onclose = (event) => {
                        if (doneReceived) return;
                        if (retries < MAX_RETRIES) {
                            retries++;
                            console.log(`WS 断线，重试 ${retries}/${MAX_RETRIES}...`);
                            setTimeout(() => {
                                connect().then(resolve).catch(reject);
                            }, 1000);
                        } else {
                            showError('连接失败，请检查网络后重试');
                            aiMessageEl.remove();
                            cleanup();
                            reject(new Error('max retries'));
                        }
                    };
                });
            }

            function cleanup() {
                setStreaming(false);
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.close();
                }
            }

            try {
                await connect();
            } catch (error) {
                console.error('WebSocket 发送失败:', error);
                cleanup();
            }
        }

        // 发送消息
        async function sendMessage() {
            if (USE_WEBSOCKET) {
                return sendMessageWS();
            }

            const input = document.getElementById('inputField');
            const content = input.value.trim();
            
            console.log('[sendMessage] content:', content, 'image:', selectedImageBase64 ? 'yes' : 'no', 'isStreaming:', isStreaming);
            
            // 如果没有内容且没有图片，不发送
            if ((!content && !selectedImageBase64) || isStreaming) return;
            
            // 清空输入
            input.value = '';
            input.style.height = 'auto';
            
            // 显示用户消息（如果有图片，显示图片预览）
            const userMessageEl = appendMessage('user', content, false, selectedImageBase64);
            
            // 保存图片数据用于发送
            const imageData = selectedImageBase64;
            
            // 清除选中的图片
            clearSelectedImage();
            
            // 显示 AI 消息占位
            const aiMessageEl = appendMessage('assistant', '', true);
            
            // 禁用发送按钮
            setStreaming(true);
            
            try {
                console.log('[sendMessage] Sending request...', 'content:', content, 'hasImage:', !!imageData);
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${jwt}`,
                        'Content-Type': 'application/json',
                        'Accept': 'text/event-stream'
                    },
                    body: JSON.stringify({
                        content: content || '',
                        session_id: currentSessionId,
                        image_url: imageData  // 包含图片数据
                    })
                });
                
                console.log('[sendMessage] Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                // 检查是否支持 ReadableStream
                if (!response.body || !response.body.getReader) {
                    // 不支持流式，直接读取全部内容
                    setStreaming(false);
                    throw new Error('浏览器不支持流式读取');
                }
                
                // 读取流
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullContent = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    
                    // 解析 SSE 事件（按双换行分割）
                    const events = buffer.split('\n\n');
                    buffer = events.pop() || '';

                    for (const eventStr of events) {
                        const lines = eventStr.split('\n');
                        let eventType = '';
                        let dataStr = '';

                        for (const line of lines) {
                            if (line.startsWith('event: ')) {
                                eventType = line.slice(7);
                            } else if (line.startsWith('data: ')) {
                                dataStr = line.slice(6);
                            }
                        }
                        
                        if (!dataStr) continue;
                        
                        // 每个事件处理前让出给浏览器渲染
                        await new Promise(r => setTimeout(r, 0));
                        
                        try {
                            const data = JSON.parse(dataStr);
                            
                            if (eventType === 'token' && data.content) {
                                fullContent += data.content;
                                updateMessage(aiMessageEl, fullContent);
                                // 让出控制权给浏览器，及时渲染每个 token
                                await new Promise(r => setTimeout(r, 0));
                            }
                            
                            if (eventType === 'thinking') {
                                // Agent 思考中，显示思考提示
                                const thinkEl = document.createElement('div');
                                thinkEl.className = 'thinking-indicator';
                                thinkEl.textContent = '🤔 ' + (data.content || '思考中...');
                                document.getElementById('messagesContainer').appendChild(thinkEl);
                            }
                            
                            if (eventType === 'tool') {
                                // 工具调用
                                const toolEl = document.createElement('div');
                                toolEl.className = 'tool-call';
                                toolEl.innerHTML = '🔧 ' + escapeHtml(data.tool_name || data.content || '执行工具');
                                document.getElementById('messagesContainer').appendChild(toolEl);
                                scrollToBottom();
                            }
                            
                            if (eventType === 'tool_result') {
                                // 工具执行结果
                                const resultEl = document.createElement('div');
                                resultEl.className = 'tool-result';
                                const resultText = data.content || '';
                                const preview = resultText.length > 100 ? resultText.slice(0, 100) + '...' : resultText;
                                resultEl.innerHTML = '✅ ' + escapeHtml(preview);
                                document.getElementById('messagesContainer').appendChild(resultEl);
                                scrollToBottom();
                            }
                            
                            if (eventType === 'done') {
                                currentSessionId = data.session_id;
                            }
                            
                            if (eventType === 'error') {
                                showError(data.message || '发送失败');
                                aiMessageEl.remove();
                            }
                        } catch (e) {
                            console.error('解析 SSE 失败:', e, dataStr);
                        }
                    }
                }
                
                // 移除光标
                removeCursor(aiMessageEl);
                
                // 刷新会话列表
                loadSessions();
                
            } catch (error) {
                console.error('发送消息失败:', error);
                showError('发送失败，请重试');
                aiMessageEl.remove();
            } finally {
                setStreaming(false);
            }
        }

        // 追加消息
        function appendMessage(role, content, withCursor = false, imageUrl = null) {
            const container = document.getElementById('messagesContainer');
            
            // 移除空状态
            const emptyState = container.querySelector('.empty-state');
            if (emptyState) emptyState.remove();
            
            const el = document.createElement('div');
            el.className = `message ${role}`;
            
            let messageContent = '';
            
            // 如果是用户消息且有图片，显示图片预览
            if (role === 'user' && imageUrl) {
                messageContent += `<div class="message-image"><img src="${imageUrl}" alt="发送的图片"></div>`;
            }
            
            // 添加文本内容
            messageContent += (role === 'assistant' ? renderMarkdown(content) : escapeHtml(content));
            
            // 如果有光标，添加光标
            messageContent += (withCursor ? '<span class="typing-cursor"></span>' : '');
            
            el.innerHTML = messageContent;
            container.appendChild(el);
            
            scrollToBottom();
            return el;
        }

        // 更新消息内容
        function updateMessage(el, content) {
            const cursor = el.querySelector('.typing-cursor');
            const isAssistant = el.classList.contains('assistant');
            el.innerHTML = isAssistant ? renderMarkdown(content) : escapeHtml(content);
            // 渲染 LaTeX 公式（使用 katex.renderToString 正则替换）
            if (typeof katex !== 'undefined') {
                try {
                    var html = el.innerHTML;
                    // 块公式 $$...$$ 或 \[...\]
                    html = html.replace(/\$\$([\s\S]*?)\$\$/g, function(_, eq) {
                        try { return katex.renderToString(eq, {displayMode: true, throwOnError: false}); }
                        catch(e) { return '$$' + eq + '$$'; }
                    });
                    html = html.replace(/\\\[([\s\S]*?)\\\]/g, function(_, eq) {
                        try { return katex.renderToString(eq, {displayMode: true, throwOnError: false}); }
                        catch(e) { return '\\[' + eq + '\\]'; }
                    });
                    // 行内公式 $...$ 或 \(...\)
                    html = html.replace(/\$([^$\n]+?)\$/g, function(_, eq) {
                        try { return katex.renderToString(eq, {displayMode: false, throwOnError: false}); }
                        catch(e) { return '$' + eq + '$'; }
                    });
                    html = html.replace(/\\\(([^)]+?)\\\)/g, function(_, eq) {
                        try { return katex.renderToString(eq, {displayMode: false, throwOnError: false}); }
                        catch(e) { return '\\(' + eq + '\\)'; }
                    });
                    el.innerHTML = html;
                } catch(e) {}
            }
            if (cursor) el.appendChild(cursor);
            scrollToBottom();
        }

        // 移除光标
        function removeCursor(el) {
            const cursor = el.querySelector('.typing-cursor');
            if (cursor) cursor.remove();
        }

        // 显示错误
        function showError(message) {
            const container = document.getElementById('messagesContainer');
            const el = document.createElement('div');
            el.className = 'error-message';
            el.textContent = message;
            container.appendChild(el);
            scrollToBottom();
        }

        // 设置流式状态
        function setStreaming(streaming) {
            isStreaming = streaming;
            document.getElementById('sendBtn').disabled = streaming;
        }

        // 滚动到底部
        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }

        // 新建对话
        function newChat() {
            currentSessionId = null;
            document.getElementById('chatTitle').textContent = '新对话';
            document.getElementById('messagesContainer').innerHTML = `
                <div class="empty-state">
                    <h2>👋 你好！</h2>
                    <p>我是你的 AI 伙伴，有什么可以帮助你的吗？</p>
                </div>
            `;
            
            // 更新侧边栏选中状态
            document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
            
            // 手机端关闭侧边栏
            closeSidebar();
        }

        // 手机端侧边栏切换
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('show');
            overlay.classList.toggle('show');
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.remove('show');
            overlay.classList.remove('show');
        }

        // 加载会话后关闭侧边栏（手机端）
        function loadSessionAndClose(sessionId) {
            loadSession(sessionId);
            closeSidebar();
        }

        // 删除会话
        async function deleteSession(event, sessionId) {
            event.stopPropagation();
            
            if (!confirm('确定删除这个对话？')) return;
            
            try {
                await fetch(`/api/chat/sessions/${sessionId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${jwt}` }
                });
                
                loadSessions();
                
                if (currentSessionId === sessionId) {
                    newChat();
                }
            } catch (error) {
                console.error('删除会话失败:', error);
            }
        }

        // 键盘事件
        function handleKeydown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '';
            
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} 分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)} 小时前`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)} 天前`;
            
            return date.toLocaleDateString('zh-CN');
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Markdown 渲染（用于 assistant 消息）
        function renderMarkdown(text) {
            if (!text) return '';
            // 配置 marked.js
            marked.setOptions({
                breaks: true,  // 支持换行
                gfm: true,     // GitHub Flavored Markdown
                highlight: function(code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        return hljs.highlight(code, { language: lang }).value;
                    }
                    return hljs.highlightAuto(code).value;
                }
            });
            return marked.parse(text);
        }

        // 自动调整输入框高度
        const inputField = document.getElementById('inputField');
        inputField.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });
    </script>
</body>
