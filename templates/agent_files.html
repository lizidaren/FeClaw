<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script>window.ROOT_DOMAIN = "{{ feclaw_domain }}";</script>
    <script src="/static/js/auth.js"></script>
    <script>
        // 阻塞式检查认证，未认证则不渲染页面
        Auth.checkAuthBeforeRender().then(authenticated => {
            if (!authenticated) {
                // 阻止页面渲染
                document.write('<div style="display:none">');
            }
        }).catch(e => {
            document.getElementById('fileList').innerHTML =
                '<div class="empty-state"><div class="icon">❌</div><p>认证异常: ' + (e.message || e) + '</p></div>';
        });
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeClaw 文件管理</title>
    <!-- CodeMirror 编辑器（本地托管） -->
    <link rel="stylesheet" href="/static/codemirror.css">
    <script src="/static/codemirror.js"></script>
    <script src="/static/cm-mode-xml.js"></script>
    <script src="/static/cm-mode-htmlmixed.js"></script>
    <script src="/static/cm-mode-javascript.js"></script>
    <script src="/static/cm-mode-css.js"></script>
    <script src="/static/cm-mode-python.js"></script>
    <script src="/static/cm-mode-markdown.js"></script>
    <script src="/static/cm-mode-yaml.js"></script>
    <script src="/static/cm-mode-sql.js"></script>
    <script src="/static/cm-mode-shell.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 15px 20px;

            color: white;
        }
        .header h1 { font-size: 18px; display: flex; align-items: center; gap: 10px; }

        .header button {
            padding: 8px 16px;

            border: 1px solid rgba(255,255,255,0.2);

        .toolbar button {
            padding: 8px 16px;

            cursor: pointer;
        }
        .toolbar button.primary {

        }

            padding: 12px 15px;
            border-bottom: 1px solid #eee;

        }
        .file-item:hover { background: #f8f8f8; }
        .file-item .icon { font-size: 20px; margin-right: 12px; cursor: default; }
        .file-item .name { flex: 1; cursor: pointer; color: #333; }
        .file-item .name:hover { color: #667eea; }
        .file-item .size { color: #888; margin-right: 8px; font-size: 14px; }
        .file-item-wrap { display: flex; align-items: center; flex: 1; cursor: pointer; }

        /* 三点按钮 */
        .three-dot-btn {
            width: 32px; height: 32px;

        /* 三点菜单面板 */

        .empty-state { text-align: center; padding: 60px 20px; color: #888; }
        .empty-state .icon { font-size: 48px; margin-bottom: 15px; }
        .back-link { display: inline-block; padding: 10px 20px; color: #667eea; text-decoration: none; }

        /* 编辑弹窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal.active { display: flex; align-items: center; justify-content: center; }

        /* 配置编辑器（暗色主题，editor-body 隐藏时占据全部空间） */
        .editor-pane #configEditor { display: none; flex: 1; flex-direction: column; padding: 20px; overflow: auto; }
        .editor-pane #configEditor #configKeyDisplay { background: #252526; padding: 12px 16px; border-radius: 6px; margin-bottom: 12px; font-family: monospace; font-size: 13px; color: #9cdcfe; word-break: break-all; border-left: 3px solid #569cd6; }

        /* 预览面板 (Markdown 渲染 / 媒体预览 / 不支持) */

            position: absolute; top: 0; left: 0; right: 0; bottom: 0;

        .preview-pane p { margin-bottom: 12px; }
        .preview-pane code { background: #f5f5f5; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }

        .preview-pane pre code { background: none; padding: 0; }
        .preview-pane blockquote { border-left: 4px solid #667eea; padding: 8px 16px; margin: 12px 0; color: #555; background: #f9f9f9; }
        .preview-pane table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
        .preview-pane th, .preview-pane td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
        .preview-pane th { background: #f5f5f5; font-weight: 600; }
        .preview-pane img { max-width: 100%; }
        .preview-pane a { color: #667eea; }

        /* 媒体预览 (video/audio) */

            display: none;

        }
        .media-preview.active { display: flex; }
        .media-preview video { max-width: 100%; max-height: 100%; outline: none; }
        .media-preview audio { width: 80%; max-width: 500px; outline: none; }

        /* 不支持预览 */
        .unsupported-preview {
            display: none;

        .CodeMirror-cursor { border-left: 2px solid #528bff; }

        .CodeMirror-focused .CodeMirror-selected { background: #264f78; }

        .cm-s-default .cm-atom { color: #dcdcaa; }
        .cm-s-default .cm-number { color: #b5cea8; }
        .cm-s-default .cm-def { color: #dcdcaa; }
        .cm-s-default .cm-variable { color: #d4d4d4; }
        .cm-s-default .cm-variable-2 { color: #9cdcfe; }
        .cm-s-default .cm-property { color: #9cdcfe; }
        .cm-s-default .cm-operator { color: #d4d4d4; }
        .cm-s-default .cm-comment { color: #6a9955; font-style: italic; }
        .cm-s-default .cm-string { color: #ce9178; }
        .cm-s-default .cm-string-2 { color: #ce9178; }
        .cm-s-default .cm-meta { color: #d4d4d4; }
        .cm-s-default .cm-qualifier { color: #569cd6; }
        .cm-s-default .cm-builtin { color: #569cd6; }
        .cm-s-default .cm-bracket { color: #d4d4d4; }
        .cm-s-default .cm-tag { color: #569cd6; }
        .cm-s-default .cm-attribute { color: #9cdcfe; }

        .modal-actions { padding: 15px 20px; border-top: 1px solid #333; display: flex; justify-content: flex-end; gap: 10px; background: #252526; }

        /* 上传进度 */
        .upload-progress { padding: 10px 20px; background: #e8f5e9; border-radius: 6px; margin: 10px 20px; }

        @media (max-width: 768px) {

    /* 自定义确认对话框 */
        .unsaved-overlay {
            display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3);
            z-index:10000; align-items:center; justify-content:center;

        .unsaved-overlay.active { display:flex; }
        .unsaved-dialog {

            cursor:pointer; font-weight:600; transition:all 0.2s;
        }

        .unsaved-actions .btn-discard:hover { background:#e0e0e0; }

        </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>📁 FeClaw 文件管理</h1>
            <span class="agent" id="agentHash">加载中...</span>
        </div>
        <button onclick="logout()">🚪 退出</button>
    </div>
    <a href="{{ home_url }}" class="back-link">← 返回主页</a>
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="toolbar">
        <button class="primary" onclick="newFile()" id="btnNewFile">📝 新建文件</button>
        <button class="primary" onclick="newFolder()" id="btnNewDir" style="margin-left:6px">📁 新建目录</button>
        <button onclick="uploadFile()" id="btnUpload">📤 上传</button>
        <button onclick="loadFiles()">🔄 刷新</button>
        <span id="readonlyBadge" style="display:none;padding:4px 10px;background:#ffebee;color:#c62828;border-radius:4px;font-size:12px;font-weight:600;margin-left:10px">🔒 只读目录</span>
        <span id="configInfoBadge" style="display:none;padding:4px 10px;background:#e3f2fd;color:#1565c0;border-radius:4px;font-size:12px;margin-left:10px">⚙️ 建议通过 <a href="/settings" style="color:#1565c0;font-weight:600" target="_blank">配置管理 →</a> 修改</span>
        <input type="file" id="fileUploadInput" style="display: none;" onchange="handleFileUpload(event)">
    </div>
    <div class="upload-progress" id="uploadProgress" style="display: none;"></div>
    <div class="file-list" id="fileList">
        <div class="empty-state"><div class="icon">⏳</div><p>加载中...</p></div>
    </div>

    <!-- 三点菜单浮层 -->
    <div class="dot-menu-panel" id="dotMenuPanel">
        <div class="menu-file-name" id="dotMenuFileName"></div>
        <div class="menu-meta" id="dotMenuMeta"></div>
        <button class="menu-item" id="dotMenuDownload">
            <span>📥</span> 下载
        </button>
        <button class="menu-item danger" id="dotMenuDelete">
            <span>🗑️</span> 删除
        </button>
    </div>

    <!-- 编辑弹窗 -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="editFileName">编辑文件</h2>
                <div class="header-actions">
                    <button class="mode-toggle-btn" id="modeToggleBtn" style="display:none" onclick="togglePreviewMode()">编辑</button>
                    <button onclick="closeModal()">&times;</button>
                </div>
            </div>
            <div class="editor-container">
                <div class="editor-pane">
                    <div class="editor-pane-header" id="editorPaneHeader">📝 编辑器（带语法高亮）</div>
                    <div class="editor-body">
                        <textarea id="editorContainer" placeholder="文件内容..."></textarea>
                        <div class="image-preview" id="imagePreview"><img id="imagePreviewImg" src="" alt="preview"></div>
                        <div class="preview-pane" id="markdownPreview"></div>
                        <div class="media-preview" id="mediaPreview"></div>
                        <div class="unsupported-preview" id="unsupportedPreview">
                            <div class="msg"><div class="big">📄</div><p>不支持预览此文件类型</p></div>
                        </div>
                    </div>
                    <div id="configEditor" style="display:none">
                        <div id="configKeyDisplay"></div>
                        <div id="configDesc" style="display:none"></div>
                        <div id="configTypeWidget" style="margin-bottom:10px"></div>
                        <textarea id="configValueEdit" placeholder="配置值..."></textarea>
                        <div id="configMeta"></div>
                    </div>
                </div>
            </div>
            <div class="modal-actions" id="modalActions">
                <button class="cancel" onclick="closeModal()">取消</button>
                <button class="save" onclick="saveFile()" id="btnSave">保存</button>
            </div>
        </div>
    </div>

    <script>
        let jwt = localStorage.getItem('feclaw_jwt');
        let currentPath = '';
        let dirtyFile = false;        // 编辑器内容是否已修改
        let lsTimer = null;             // localStorage 自动保存定时器
        const LS_PREFIX = 'fclw_';      // localStorage key 前缀
        let editingFile = null;
        let editor = null;  // CodeMirror 实例
        let cosClient = null;
        let stsCredential = null;
        let bucket = '';
        let region = '';
        let userPrefix = '';
        let STORAGE_BACKEND = null;  // 'cos' | 'local'
        let currentMode = 'edit';  // 'edit' | 'preview'
        let currentFileType = 'text';  // 'text' | 'markdown' | 'image' | 'video' | 'audio' | 'binary'
        let fileListCache = [];  // 缓存当前文件列表，供三点菜单使用

        // 转义路径中的特殊字符，防止 XSS
        function escapeJsStr(s) {
            return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r');
        }
        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, function(c) {
                return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
            });
        }
        function escapeAttr(s) {
            return String(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        const host = window.location.host;
        const path = window.location.pathname;
        // 子域名模式：从 host 提取
        const hashMatch = host.match(/^([a-f0-9]{4})\./);
        // 单站点模式：从 URL 路径 /agent/{hash}/... 提取
        const pathMatch = path.match(/^\/agent\/([a-f0-9]+)\//);
        const agentHash = (hashMatch ? hashMatch[1] : null) || (pathMatch ? pathMatch[1] : null);
        document.getElementById('agentHash').textContent = 'Agent: ' + agentHash;

        if (!jwt) {
            window.location.href = '/login';
        } else {
            // 检测存储后端（COS / 本地）并相应初始化
            initBackend();
        }

        // --- 存储后端初始化 ---

        async function initBackend() {
            try {
                const res = await fetch('/api/file/sts-credential', {
                    headers: { 'Authorization': 'Bearer ' + jwt }
                });

                if (res.status === 401) {
                    logout();
                    return;
                }

                let data = null;
                try { data = await res.json(); } catch (e) { /* 可能无 body */ }

                // 没有任何 COS 配置 → 本地存储模式
                const isCosReady = (res.status === 200) && data && data.credentials;
                if (!isCosReady) {
                    STORAGE_BACKEND = 'local';
                    console.log('[File] 本地存储模式');
                    updateBackendBadge();
                    restorePathFromUrl();
                    return;
                }

                // COS 模式
                STORAGE_BACKEND = 'cos';
                stsCredential = data.credentials;
                bucket = data.bucket;
                region = data.region;
                userPrefix = data.prefix;
                cosClient = new COS({
                    SecretId: stsCredential.secret_id,
                    SecretKey: stsCredential.secret_key,
                    XCosSecurityToken: stsCredential.session_token
                });
                console.log('[File] COS 客户端已初始化, prefix:', userPrefix);
                updateBackendBadge();
                restorePathFromUrl();
            } catch (e) {
                console.error('[File] 初始化失败:', e);
                // 网络错误或解析失败 → 退化到本地模式
                STORAGE_BACKEND = 'local';
                updateBackendBadge();
                restorePathFromUrl();
            }
            // 初始化完成后检查草稿
            setTimeout(autoRestoreOnLoad, 100);
        }

        async function fetchVFSDir(path) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);
            try {
                const hashParam = agentHash ? '&agent_hash=' + encodeURIComponent(agentHash) : '';
                const res = await fetch('/api/files?path=' + encodeURIComponent(path) + hashParam, {
                    headers: { 'Authorization': 'Bearer ' + jwt },
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                return data.files || [];
            } catch (e) {
                if (e.name === 'AbortError') throw new Error('请求超时');
                throw e;
            }
        }

        async function fetchVFSFile(path) {
            const res = await fetch('/api/file?path=' + encodeURIComponent(path), {
                headers: { 'Authorization': 'Bearer ' + jwt }
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return await res.json();
        }

                method: 'PUT',
                headers: {

            });

        async function saveContentFile(path, content) {
            var hp = agentHash ? '&agent_hash=' + encodeURIComponent(agentHash) : '';
            // 保存文本文件
            if (STORAGE_BACKEND === 'local') {
                const res = await fetch('/api/file?path=' + encodeURIComponent(path) + hp, {
                    method: 'PUT',
                    headers: { 'Authorization': 'Bearer ' + jwt, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });
                if (!res.ok) {
                    let err = 'HTTP ' + res.status;
                    try { const j = await res.json(); err = j.detail || err; } catch (e) {}
                    throw new Error(err);
                }
                return await res.json();
            }
            // COS 模式：原有签名 URL PUT 流程
            const res = await fetch('/api/file/signed-url', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + jwt, 'Content-Type': 'application/json' },
                body: JSON.stringify({ path: path, operation: 'upload' })
            });
            if (!res.ok) throw new Error('获取签名 URL 失败');
            const data = await res.json();
            const uploadRes = await fetch(data.url, {
                method: 'PUT',
                headers: { 'Content-Type': 'text/plain; charset=utf-8' },

            });

                    method: 'POST',

                });

                    try { const j = await res.json(); err = j.detail || err; } catch (e) {}
                    throw new Error(err);
                }
                return await res.json();
            }
            // COS 模式：原有签名 URL PUT
            const res = await fetch('/api/file/signed-url', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + jwt, 'Content-Type': 'application/json' },
                body: JSON.stringify({ path: path, operation: 'upload' })

        function formatSize(bytes) {
            if (bytes === 0) return '-';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function formatTime(isoStr) {
            if (!isoStr) return '-';
            try {
                const d = new Date(isoStr);
                if (isNaN(d.getTime())) return isoStr;
                const pad = n => String(n).padStart(2, '0');
                return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
                    + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
            } catch (e) {
                return isoStr;
            }
        }

        function checkUnsavedDraft(path, url, category) {
            // 异步检查草稿，有则弹窗询问
            return new Promise(function(resolve) {
                try {
                    var saved = localStorage.getItem(LS_PREFIX + 'unsaved_' + path);
                    if (saved && saved.length > 0) {
                        var dp = localStorage.getItem(LS_PREFIX + 'draft_path');
                        if (dp !== path) { resolve(false); return; }
                        pendingDraftPath = path;
                        document.getElementById('draftOverlayMsg').textContent =
                            '文件「' + path + '」有未保存的编辑，是否继续编辑？';
                        document.getElementById('draftOverlay').classList.add('active');
                        // 覆盖 restoreDraft：直接用草稿内容打开
                        window.__draftRestoreCallback = function() {
                            var isMarkdown = (category === 'markdown');
                            if (isMarkdown) {
                                // 切换为编辑模式，而非预览
                                document.getElementById('editorContainer').style.display = 'block';
                                initEditor(saved, 'markdown');
                                var toggleBtn = document.getElementById('modeToggleBtn');
                                if (toggleBtn) { toggleBtn.style.display = ''; toggleBtn.textContent = '预览'; toggleBtn.classList.remove('active'); }
                                currentMode = 'edit';
                            } else {
                                document.getElementById('editorContainer').style.display = 'block';
                                document.getElementById('modeToggleBtn').style.display = 'none';
                                initEditor(saved || '', detectCodeMirrorMode(path));
                            }
                            dirtyFile = true;
                        };
                        // 覆盖 discardDraft：清除草稿，加载服务器内容
                        window.__draftDiscardCallback = function() {
                            try {
                                localStorage.removeItem(LS_PREFIX + 'unsaved_' + path);
                                localStorage.removeItem(LS_PREFIX + 'draft_path');
                            } catch(e) {}
                            pendingDraftPath = null;
                            // 用服务器内容打开
                            if (category === 'markdown') {
                                fetch(url).then(function(r) { return r.text(); }).then(function(content) {
                                    initEditor(content, 'markdown');
                                    showMarkdownPreview(content);
                                }).catch(function() {});
                            } else {
                                fetch(url).then(function(r) { return r.text(); }).then(function(content) {
                                    document.getElementById('editorContainer').style.display = 'block';
                                    document.getElementById('modeToggleBtn').style.display = 'none';
                                    initEditor(content || '', detectCodeMirrorMode(path));
                                }).catch(function() {});
                            }
                        };
                        resolve(true);
                        return;
                    }
                } catch(e) {}
                resolve(false);
            });
        }

        function autoRestoreOnLoad() {
            // 页面加载后检测是否有草稿，自动打开文件（草稿确认由 openFile 中的 checkUnsavedDraft 处理）
            try {
                var dp = localStorage.getItem(LS_PREFIX + 'draft_path');
                if (!dp) return;
                var saved = localStorage.getItem(LS_PREFIX + 'unsaved_' + dp);
                if (!saved || saved.length === 0) return;
                var dir = '';
                var slashIdx = dp.lastIndexOf('/');
                if (slashIdx >= 0) {
                    dir = dp.substring(0, slashIdx);
                }
                // 延迟等待文件列表加载，然后导航 + 打开文件
                setTimeout(function() {
                    if (dir !== currentPath) {
                        navigate(dir);
                        setTimeout(function() { openFile(dp); }, 300);
                    } else {
                        openFile(dp);
                    }
                }, 500);
            } catch(e) {}
        }

        // --- 三点菜单 ---

        let dotMenuTargetPath = null;

        function toggleDotMenu(event, escapedPath) {
            // escapedPath 已经过 escapeJsStr 处理，直接作为 JS 字符串使用
            dotMenuTargetPath = escapedPath;
            const panel = document.getElementById('dotMenuPanel');

            if (panel.classList.contains('active') && dotMenuTargetPath === escapedPath) {
                closeDotMenu();
                return;
            }

            // 从缓存中找到文件信息
            const fileInfo = fileListCache.find(f => escapeJsStr(f.path) === escapedPath);
            if (!fileInfo) return;

            document.getElementById('dotMenuFileName').textContent = '📄 ' + fileInfo.name;
            document.getElementById('dotMenuMeta').innerHTML =
                '修改时间: ' + formatTime(fileInfo.updated_at) + '<br>' +
                '文件大小: ' + formatSize(fileInfo.size);

            // 定位面板
            const btn = event.currentTarget;
            const rect = btn.getBoundingClientRect();
            const panelWidth = 260;
            let left = rect.right - panelWidth;
            if (left < 8) left = 8;
            let top = rect.bottom + 4;
            // 避免超出视口底部
            if (top + 200 > window.innerHeight) {
                top = rect.top - 210;
            }

            panel.style.left = left + 'px';
            panel.style.top = top + 'px';
            panel.classList.add('active');
        }

        // --- 文件类型检测 ---

        function getFileCategory(path) {
            const ext = path.split('.').pop().toLowerCase();
            if (['md', 'markdown'].includes(ext)) return 'markdown';
            if (['png', 'jpg', 'jpeg', 'gif', 'webp', 'svg', 'bmp', 'ico'].includes(ext)) return 'image';
            if (['mp4', 'webm', 'ogg', 'mov'].includes(ext)) return 'video';
            if (['mp3', 'wav', 'flac', 'm4a'].includes(ext)) return 'audio';
            return 'text';
        }

        function detectCodeMirrorMode(path) {
            const ext = path.split('.').pop().toLowerCase();
            const modeMap = {
                'py': 'python',
                'js': 'javascript',
                'jsx': 'jsx',
                'ts': 'javascript',
                'tsx': 'jsx',
                'json': 'application/json',
                'html': 'htmlmixed',
                'htm': 'htmlmixed',
                'xml': 'xml',
                'svg': 'xml',
                'css': 'css',
                'scss': 'css',
                'less': 'css',
                'md': 'markdown',
                'markdown': 'markdown',
                'yaml': 'yaml',
                'yml': 'yaml',
                'sql': 'sql',
                'sh': 'shell',
                'bash': 'shell',
                'zsh': 'shell',
            };
            return modeMap[ext] || null;
        }

        function isBinaryContent(text) {
            // 检查字符串是否包含 null 字节（二进制特征）
            return text.indexOf('\0') !== -1;
        }

        function hideAllPanes() {
            document.getElementById('editorContainer').style.display = 'none';
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('markdownPreview').classList.remove('active');
            document.getElementById('mediaPreview').classList.remove('active');
            document.getElementById('mediaPreview').innerHTML = '';
            document.getElementById('unsupportedPreview').classList.remove('active');
            document.getElementById('modeToggleBtn').style.display = 'none';
            document.getElementById('modalActions').style.display = 'flex';
            document.getElementById('btnSave').style.display = '';
            document.getElementById('editorPaneHeader').style.display = '';
        }

        // --- 打开文件（按类型分发）---

        async function openFile(path) {
            // 如果 pendingDraftPath 匹配，说明是草稿恢复，静默继续
            var isDraftRestore = false;
            if (pendingDraftPath === path) {
                isDraftRestore = true;
                pendingDraftPath = null;
            }
            editingFile = path;
            document.getElementById('editFileName').textContent = path;
            document.getElementById('editModal').classList.add('active');

            const category = getFileCategory(path);
            currentFileType = category;
            currentMode = (category === 'markdown') ? 'preview' : 'edit';

            // 隐藏 config 编辑器
            document.getElementById('configEditor').style.display = 'none';
            hideAllPanes();

            // config/ 虚拟目录走独立配置编辑器（不使用 CodeMirror）
            if (path === 'config' || path.startsWith('config/')) {
                openConfigFile(path);
                return;
            }

            // 后端无关：获取预览 URL
            try {
                const url = await getFilePreviewUrl(path);

                // 检查并显示草稿恢复对话框
                if (await checkUnsavedDraft(path, url, category)) {
                    // 草稿恢复对话框会处理内容加载
                    return;
                }
                switch (category) {
                    case 'image':
                        showImagePreview(url);
                        break;
                    case 'video':
                        showMediaPreview('video', url);
                        break;
                    case 'audio':
                        showMediaPreview('audio', url);
                        break;
                    case 'markdown':
                        await openMarkdownFile(url, path);
                        break;
                    default:
                        await openTextFile(url, path);
                        break;
                }
            } catch (e) {
                alert('加载失败: ' + e.message);
            }
        }

        function showImagePreview(url) {
            hideAllPanes();
            document.getElementById('imagePreview').style.display = 'flex';
            document.getElementById('imagePreviewImg').src = url;
            document.getElementById('modalActions').style.display = 'none';
        }

        function showMediaPreview(type, url) {
            hideAllPanes();
            const container = document.getElementById('mediaPreview');
            container.innerHTML = type === 'video'
                ? '<video controls autoplay src="' + url + '"></video>'
                : '<audio controls autoplay src="' + url + '"></audio>';
            container.classList.add('active');
            document.getElementById('modalActions').style.display = 'none';
        }

        async function openMarkdownFile(url, path) {
            try {
                const contentRes = await fetch(url);
                if (!contentRes.ok) throw new Error('HTTP ' + contentRes.status);
                var content = await contentRes.text();
                // 检查草稿，延迟弹窗询问（由 openFile 统一处理）
                // （草稿恢复逻辑在 draftConfirm 流程中处理）

                // 同时初始化 CodeMirror（编辑模式备用）
                initEditor(content, 'markdown');

                // 显示预览
                showMarkdownPreview(content);
            } catch (e) {
                alert('加载 Markdown 失败: ' + e.message);
            }
        }

        function showMarkdownPreview(mdContent) {
            hideAllPanes();
            document.getElementById('editorContainer').style.display = 'none';
            document.getElementById('markdownPreview').innerHTML = marked.parse(mdContent);
            document.getElementById('markdownPreview').classList.add('active');
            document.getElementById('editorPaneHeader').style.display = 'none';

            // 显示模式切换按钮
            const toggleBtn = document.getElementById('modeToggleBtn');
            toggleBtn.style.display = '';
            toggleBtn.textContent = '编辑';
            toggleBtn.classList.add('active');

            document.getElementById('modalActions').style.display = 'none';
            currentMode = 'preview';
        }

        async function openTextFile(url, path) {
            try {
                const contentRes = await fetch(url);
                if (!contentRes.ok) throw new Error('HTTP ' + contentRes.status);
                var content = await contentRes.text();

                // 草稿恢复逻辑统一在 openFile → draftConfirm 中处理

                // 检查是否为二进制内容
                if (isBinaryContent(content)) {
                    showUnsupportedPreview();
                    return;
                }

                showCodeEditor(content, path);
            } catch (e) {
                alert('加载文件失败: ' + e.message);
            }
        }

        function showUnsupportedPreview() {
            hideAllPanes();
            document.getElementById('unsupportedPreview').classList.add('active');
            document.getElementById('modalActions').style.display = 'none';
        }

        function showCodeEditor(content, path) {
            hideAllPanes();
            document.getElementById('editorContainer').style.display = 'block';
            document.getElementById('editorPaneHeader').style.display = '';
            document.getElementById('modalActions').style.display = 'flex';
            document.getElementById('btnSave').style.display = '';
            document.getElementById('modeToggleBtn').style.display = 'none';
            initEditor(content || '', detectCodeMirrorMode(path));
            currentMode = 'edit';
        }

        // --- 预览/编辑切换（Markdown）---

        function togglePreviewMode() {
            if (currentMode === 'preview') {
                // 切换到编辑模式
                hideAllPanes();
                document.getElementById('editorContainer').style.display = 'block';
                document.getElementById('editorPaneHeader').style.display = '';
                document.getElementById('modalActions').style.display = 'flex';
                document.getElementById('btnSave').style.display = '';
                document.getElementById('modeToggleBtn').style.display = '';
                document.getElementById('modeToggleBtn').textContent = '预览';
                document.getElementById('modeToggleBtn').classList.remove('active');
                if (editor) editor.refresh();
                currentMode = 'edit';
            } else {
                // 切换到预览模式
                const mdContent = editor ? editor.getValue() : '';
                showMarkdownPreview(mdContent);
            }
        }

        // --- Config 文件编辑（特殊处理）---

        async function openConfigFile(path) {
            hideAllPanes();
            if (editor) { editor.getTextArea().style.display = 'block'; editor.toTextArea(); editor = null; }
            document.querySelector('.editor-body').style.display = 'none';
            document.getElementById('editorContainer').style.display = 'none';
            document.getElementById('configEditor').style.display = 'flex';
            document.getElementById('modeToggleBtn').style.display = 'none';
            document.getElementById('modalActions').style.display = 'flex';
            document.getElementById('btnSave').style.display = '';

            try {
                const data = await fetchVFSFile(path);
                document.getElementById('configKeyDisplay').textContent = '📋 ' + path;
                document.getElementById('configMeta').textContent = '大小: ' + data.size + ' bytes';

                const rawVal = data.content || '';
                const keyName = path.split('/').pop();
                const descEl = document.getElementById('configDesc');
                const widgetEl = document.getElementById('configTypeWidget');
                const textareaEl = document.getElementById('configValueEdit');

                const lower = rawVal.trim().toLowerCase();
                let type = 'text';
                if (lower === 'true' || lower === 'false') type = 'bool';
                else if (/^\d+(\.\d+)?$/.test(rawVal.trim())) type = 'number';
                else if (rawVal.trim().startsWith('{') || rawVal.trim().startsWith('[')) type = 'json';
                else if (rawVal.length > 500) type = 'longtext';

                const reservedKeys = ['heartbeat.interval', 'tools'];
                const isReserved = reservedKeys.includes(keyName);
                const friendlyName = keyName.replace(/[-_.]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                descEl.textContent = isReserved
                    ? '🔮 ' + friendlyName + ' — 未来预留配置，修改暂时不会生效'
                    : '💡 ' + friendlyName;
                descEl.style.display = 'block';

                if (type === 'bool') {
                    textareaEl.style.display = 'none';
                    widgetEl.style.display = 'block';
                    const isOn = lower === 'true';
                    widgetEl.innerHTML = '<label style="display:flex;align-items:center;gap:12px;cursor:pointer;padding:12px 16px;background:#252526;border-radius:8px;font-size:14px;color:#d4d4d4">' +
                        '<input type="checkbox" ' + (isOn ? 'checked' : '') + ' id="configBoolToggle" style="width:22px;height:22px;accent-color:#4ec9b0;cursor:pointer">' +
                        '<span>' + (isOn ? '✅ 已启用' : '⛔ 已禁用') + '</span>' +
                        '</label>';
                } else if (type === 'number') {
                    textareaEl.style.display = 'none';
                    widgetEl.style.display = 'block';
                    widgetEl.innerHTML = '<input type="number" value="' + rawVal.trim() + '" id="configNumberInput" ' +
                        'style="width:200px;padding:12px;background:#1e1e1e;color:#d4d4d4;border:1px solid #3c3c3c;border-radius:6px;font-size:14px;outline:none">';
                } else if (type === 'json') {
                    textareaEl.style.display = 'block';
                    textareaEl.value = JSON.stringify(JSON.parse(rawVal), null, 2) || rawVal;
                    textareaEl.style.minHeight = '200px';
                    widgetEl.style.display = 'none';
                } else if (type === 'longtext') {
                    textareaEl.style.display = 'block';
                    textareaEl.value = rawVal;
                    textareaEl.style.minHeight = '300px';
                    widgetEl.style.display = 'none';
                } else {
                    textareaEl.style.display = 'block';
                    textareaEl.value = rawVal;
                    textareaEl.style.minHeight = '80px';
                    widgetEl.style.display = 'none';
                }
            } catch (e) {
                alert('加载配置失败: ' + e.message);
            }
        }

        // --- CodeMirror 初始化 ---

        function initEditor(content, mode) {
            const textarea = document.getElementById('editorContainer');
            if (editor) {
                editor.setValue(content || '');
                if (mode) editor.setOption('mode', mode);
                editor.refresh();
                return;
            }
            textarea.value = content || '';
            editor = CodeMirror.fromTextArea(textarea, {
                mode: mode || null,
                theme: 'default',
                indentUnit: 4,
                tabSize: 4,
                lineNumbers: true,
                matchBrackets: true,
                lineWrapping: false,
                extraKeys: {
                    "Esc": function() { closeModal(); }
                }
            });
            editor.on('change', function() {
                dirtyFile = true;
                updateMarkdownPreview();
                // 防抖保存到 localStorage（崩溃恢复用）
                if (lsTimer) clearTimeout(lsTimer);
                lsTimer = setTimeout(function() {
                    try {
                        var content = editor.getValue();
                        if (content && editingFile) {
                            localStorage.setItem(LS_PREFIX + 'unsaved_' + editingFile, content);
                            localStorage.setItem(LS_PREFIX + 'draft_path', editingFile);
                        }
                    } catch(e) { /* localStorage 满或不可用 */ }
                }, 1000);
            });
            editor.refresh();
        }

        // --- 关闭弹窗 ---

        function closeModal() {
            if (dirtyFile) {
                showUnsavedDialog();
                return;
            }
            document.getElementById('editModal').classList.remove('active');
            if (editor) { editor.getTextArea().style.display = 'block'; editor.toTextArea(); editor = null; }
            const body = document.querySelector('.editor-body');
            if (body) body.style.display = '';
            document.getElementById('editorContainer').style.display = 'block';
            document.getElementById('configEditor').style.display = 'none';
            document.getElementById('configDesc').style.display = 'none';
            document.getElementById('configValueEdit').style.display = 'block';
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('markdownPreview').classList.remove('active');
            document.getElementById('mediaPreview').classList.remove('active');
            document.getElementById('mediaPreview').innerHTML = '';
            document.getElementById('unsupportedPreview').classList.remove('active');
            document.getElementById('modeToggleBtn').style.display = 'none';
            document.getElementById('modalActions').style.display = 'flex';
            document.getElementById('btnSave').style.display = '';
            document.getElementById('editorPaneHeader').style.display = '';
            editingFile = null;
            currentMode = 'edit';
            currentFileType = 'text';
        }

        // --- 保存文件 ---

        async function saveFile() {
            if (!editingFile) return;

            // config/ 虚拟目录走独立配置编辑器
            if (editingFile === 'config' || editingFile.startsWith('config/')) {
                let content;
                const toggle = document.getElementById('configBoolToggle');
                const numberInput = document.getElementById('configNumberInput');
                if (toggle) {
                    content = toggle.checked ? 'true' : 'false';
                } else if (numberInput) {
                    content = String(numberInput.value);
                } else {
                    content = document.getElementById('configValueEdit').value;
                }
                try {
                    await saveVFSFile(editingFile, content);
                    closeModal();
                    loadFiles();
                } catch (e) {
                    alert('保存失败: ' + e.message);
                }
                return;
            }

            let content;
            if (editor) {
                content = editor.getValue();
            } else {
                content = document.getElementById('configValueEdit').value;
            }

            try {
                await saveContentFile(editingFile, content);
                closeModal();
                loadFiles();
            } catch (e) {
                alert('保存失败: ' + e.message);
            }
        }

        // --- 新建文件 ---

        function newFile() {
            if (isReadonlyPath()) {
                alert('只读目录不允许新建文件');
                return;
            }
            document.getElementById('newFileDialogTitle').textContent = '新建文件';
            document.getElementById('btnNewFileConfirm').textContent = '创建';
            document.getElementById('newFileNameInput').value = '';
            document.getElementById('newFileNameInput').placeholder = 'example.md';
            document.getElementById('newFileNameInput').dataset.mode = 'file';
            document.getElementById('newFileOverlay').classList.add('active');
            setTimeout(function() { document.getElementById('newFileNameInput').focus(); }, 100);
        }

        function newFolder() {
            if (isReadonlyPath()) {
                alert('只读目录不允许新建目录');
                return;
            }
            document.getElementById('newFileDialogTitle').textContent = '新建目录';
            document.getElementById('btnNewFileConfirm').textContent = '创建';
            document.getElementById('newFileNameInput').value = '';
            document.getElementById('newFileNameInput').placeholder = 'my-folder';
            document.getElementById('newFileNameInput').dataset.mode = 'dir';
            document.getElementById('newFileOverlay').classList.add('active');
            setTimeout(function() { document.getElementById('newFileNameInput').focus(); }, 100);
        }

        function newFileConfirm() {
            var name = document.getElementById('newFileNameInput').value.trim();
            if (!name) return;
            var mode = document.getElementById('newFileNameInput').dataset.mode;
            document.getElementById('newFileOverlay').classList.remove('active');
            if (mode === 'dir') {
                // 创建目录：在目录内放一个空 .directory 标记文件
                var dirPath = currentPath ? currentPath + '/' + name : name;
                var markerPath = dirPath + '/.directory';
                saveContentFile(markerPath, '').then(function() {
                    loadFiles();
                }).catch(function(e) {
                    alert('创建目录失败: ' + e.message);
                });
                return;
            }
            // 创建文件
            if (isReadonlyPath()) return;
            const path = currentPath ? currentPath + '/' + name : name;
            editingFile = path;
            document.getElementById('editFileName').textContent = '新建: ' + name;
            document.getElementById('editModal').classList.add('active');
            if (editor) { editor.getTextArea().style.display = 'block'; editor.toTextArea(); editor = null; }
            document.getElementById('configEditor').style.display = 'none';
            document.getElementById('editorContainer').style.display = 'block';
            document.getElementById('modeToggleBtn').style.display = 'none';
            document.getElementById('modalActions').style.display = 'flex';
            document.getElementById('btnSave').style.display = '';
            document.getElementById('editorPaneHeader').style.display = '';
            hideAllPanes();
            const cmode = detectCodeMirrorMode(path);
            initEditor('', cmode);
            currentMode = 'edit';
            currentFileType = 'text';
        }

        // --- 上传文件 ---

        function uploadFile() {
            if (isReadonlyPath()) {
                alert('只读目录不允许上传文件');
                return;
            }
            document.getElementById('fileUploadInput').click();
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const path = currentPath ? currentPath + '/' + file.name : file.name;

            if (isReadonlyPath() || path === 'public' || path.startsWith('public/') || path === 'config' || path.startsWith('config/')) {
                alert('公共空间为只读，不允许上传');
                return;
            }

            const progressEl = document.getElementById('uploadProgress');
            progressEl.style.display = 'block';
            progressEl.className = 'upload-progress';
            progressEl.textContent = '⏳ 正在上传 ' + file.name + '...';

            try {
                await uploadBinaryFile(file, path);
                progressEl.textContent = '✅ 上传成功: ' + file.name;
                loadFiles();
            } catch (e) {
                progressEl.className = 'upload-progress error';
                progressEl.textContent = '❌ 上传失败: ' + e.message;
            }

            event.target.value = '';
            setTimeout(() => progressEl.style.display = 'none', 3000);
        }

        // --- 下载文件 ---

        async function downloadFile(path) {
            try {
                const url = await getFileDownloadUrl(path, 300);
                const a = document.createElement('a');
                a.href = url;
                a.download = path.split('/').pop();
                a.target = '_blank';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } catch (e) {
                alert('下载失败: ' + e.message);
            }
        }

        // --- 删除文件（兼容旧接口）---

        async function deleteFile(path, name) {
            if (!confirm('确定要删除 "' + name + '" 吗？')) return;
            deleteFileByPath(path);
        }
    </script>
    <!-- 未保存确认对话框 -->
    <!-- 新建文件/目录对话框 -->
    <div class="unsaved-overlay" id="newFileOverlay">
        <div class="unsaved-dialog" style="text-align:left;max-width:380px;">
            <h3 style="margin:0 0 12px;color:#1a1a2e;font-size:16px;font-weight:600;" id="newFileDialogTitle">新建文件</h3>
            <p style="margin:0 0 4px;color:#888;font-size:13px;">文件名</p>
            <input type="text" id="newFileNameInput" placeholder="example.md" style="width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;box-sizing:border-box;margin-bottom:16px;" autofocus>
            <div style="display:flex;gap:12px;justify-content:flex-end;">
                <button class="btn-discard" onclick="document.getElementById('newFileOverlay').classList.remove('active')">取消</button>
                <button class="btn-save-close" id="btnNewFileConfirm" onclick="newFileConfirm()">创建</button>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('newFileNameInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') newFileConfirm();
        });
    </script>
    <!-- 草稿恢复确认对话框 -->
    <div class="unsaved-overlay" id="draftOverlay">
        <div class="unsaved-dialog">
            <div style="text-align:center;margin-bottom:16px;">
                <div style="width:48px;height:48px;border-radius:50%;background:#e8f5e9;display:inline-flex;align-items:center;justify-content:center;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2e7d32" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                </div>
            </div>
            <h3 style="margin:0 0 4px;color:#1a1a2e;font-size:16px;font-weight:600;">检测到未保存的编辑</h3>
            <p style="margin:0 0 20px;color:#888;font-size:13px;" id="draftOverlayMsg">上次编辑的内容尚未保存，是否继续编辑？</p>
            <div class="unsaved-actions">
                <button class="btn-save-close" onclick="restoreDraft()" style="order:1">继续编辑</button>
                <button class="btn-discard" onclick="discardDraft()" style="order:2">放弃草稿</button>
            </div>
        </div>
    </div>
    <div class="unsaved-overlay" id="unsavedOverlay">
        <div class="unsaved-dialog">
            <div style="text-align:center;margin-bottom:16px;">
                <div style="width:48px;height:48px;border-radius:50%;background:#fff3e0;display:inline-flex;align-items:center;justify-content:center;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f57c00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                        <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                </div>
            </div>
            <h3 style="margin:0 0 4px;color:#1a1a2e;font-size:16px;font-weight:600;">要保存对此文件的更改吗？</h3>
            <p style="margin:0 0 20px;color:#888;font-size:13px;">如果关闭而不保存，此文件的更改将丢失。</p>
            <div class="unsaved-actions">
                <button class="btn-save-close" onclick="saveAndClose()" style="order:1">保存</button>
                <button class="btn-discard" onclick="discardAndClose()" style="order:2">不保存</button>
                <button class="btn-cancel" onclick="document.getElementById('unsavedOverlay').classList.remove('active')" style="order:3">取消</button>
            </div>
        </div>
    </div>
