<!DOCTYPE html>
<html><head><title>单词查询</title>
<style>
body{font-family:sans-serif;max-width:640px;margin:auto;padding:20px}
input{padding:8px;width:60%}
button{padding:8px 16px}
.card{background:#f5f5f5;border-radius:8px;padding:16px;margin-top:16px}
.pro{color:#666;font-style:italic}
.def{margin:8px 0}
.ex{color:#444;border-left:3px solid #ddd;padding-left:8px;margin:4px 0}
</style></head><body>
<h1>📖 词汇查询</h1>
<input id="word" placeholder="输入单词" /><button onclick="query()">查询</button>
<div id="result"></div>
<script>
async function query(){
  const w=document.getElementById('word').value;
  const r=await fetch('/apps/vocab-app/api/query',{method:'POST',body:JSON.stringify({word:w}),headers:{'Content-Type':'application/json'}});
  const d=await r.json();
  let html='<div class=card><h2>'+d.word;
  if(d.pronunciation)html+=' <span class=pro>'+d.pronunciation+'</span>';
  html+='</h2>';
  if(d.definitions)d.definitions.forEach(def=>{
    html+='<div class=def><b>'+def.part_of_speech+'</b> '+def.meaning+'</div>';
    if(def.examples)def.examples.forEach(ex=>html+='<div class=ex>'+ex+'</div>');
  });
  if(d.synonyms)html+='<div><b>近义词：</b>'+d.synonyms.join(', ')+'</div>';
  html+='</div>';
  document.getElementById('result').innerHTML=html;
}
</script></body></html>
