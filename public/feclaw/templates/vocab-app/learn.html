<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>词汇学习 - 背单词</title>
<style>
:root {
  --bg: #f0f4ff;
  --card-bg: rgba(255,255,255,0.85);
  --text: #1e293b;
  --text-secondary: #64748b;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --border: rgba(0,0,0,0.08);
  --shadow: 0 4px 24px rgba(0,0,0,0.06);
  --tag-bg: #eff6ff;
  --example-bg: #f8fafc;
  --success: #16a34a;
}
@media (prefers-color-scheme: dark) {
:root {
  --bg: #0f172a;
  --card-bg: rgba(30,41,59,0.85);
  --text: #e2e8f0;
  --text-secondary: #94a3b8;
  --accent: #3b82f6;
  --accent-hover: #60a5fa;
  --border: rgba(255,255,255,0.08);
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --tag-bg: #1e3a5f;
  --example-bg: #1e293b;
  --success: #22c55e;
}
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 40px 20px;
}
.container { width: 100%; max-width: 640px; }
.top-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 24px;
}
.back-link {
  color: var(--accent); text-decoration: none; font-weight: 600;
}
.back-link:hover { text-decoration: underline; }
.progress-bar {
  background: var(--border); border-radius: 10px; height: 8px;
  margin-bottom: 32px; overflow: hidden;
}
.progress-fill {
  background: var(--accent); height: 100%; border-radius: 10px;
  transition: width 0.4s ease;
}
.progress-text {
  text-align: center; color: var(--text-secondary);
  font-size: 0.9rem; margin-top: 8px;
}
.card {
  background: var(--card-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 32px;
  box-shadow: var(--shadow);
  text-align: center;
  min-height: 300px;
  display: flex; flex-direction: column; justify-content: center;
  align-items: center;
  transition: transform 0.3s, opacity 0.3s;
}
.card.switching {
  transform: translateY(-20px); opacity: 0;
}
.word-display {
  font-size: 2.8rem; font-weight: 700;
  margin-bottom: 12px;
}
.word-pron {
  color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 24px;
}
.definition-section {
  border-top: 1px solid var(--border);
  padding-top: 20px; margin-top: 8px; width: 100%;
  text-align: left;
  display: none;
}
.definition-section.show { display: block; }
.def-item { margin-bottom: 14px; }
.def-pos {
  display: inline-block;
  background: var(--tag-bg);
  color: var(--accent);
  padding: 2px 10px; border-radius: 6px;
  font-size: 0.85rem; font-weight: 600;
  margin-bottom: 6px;
}
.def-meaning { font-size: 1.05rem; margin-bottom: 6px; }
.def-examples { margin-top: 6px; padding-left: 20px; }
.def-examples li { color: var(--text-secondary); font-size: 0.92rem; margin-bottom: 3px; }
.syn-section {
  margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap;
}
.syn-tag {
  background: var(--tag-bg); color: var(--accent);
  padding: 4px 12px; border-radius: 20px;
  font-size: 0.88rem;
}
.actions { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; justify-content: center; }
.btn {
  padding: 14px 28px;
  border: none; border-radius: 12px;
  font-size: 1rem; font-weight: 600; cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-outline {
  background: transparent; color: var(--accent);
  border: 2px solid var(--accent);
}
.btn-outline:hover { background: rgba(37,99,235,0.08); }
.loading-text {
  color: var(--text-secondary); font-size: 1rem;
  padding: 20px;
}
.stats {
  margin-top: 24px;
  background: var(--card-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 24px;
  box-shadow: var(--shadow);
  display: flex; gap: 24px; justify-content: center;
}
.stat-item { text-align: center; }
.stat-num { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 0.85rem; color: var(--text-secondary); }
@media (max-width: 640px) {
  body { padding: 16px 12px; }
  .card { padding: 28px 20px; min-height: 240px; }
  .word-display { font-size: 2rem; }
  .actions { flex-direction: column; }
  .btn { width: 100%; }
}
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <a href="." class="back-link">← 返回首页</a>
    <span id="counter"></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text" id="progressText"></div>

  <div class="card" id="card">
    <div class="word-display" id="wordDisplay"></div>
    <div class="word-pron" id="wordPron"></div>
    <div class="loading-text" id="cardLoading" style="display:none">加载释义中...</div>
    <div class="definition-section" id="defSection"></div>
  </div>

  <div class="actions">
    <button class="btn btn-outline" id="showDefBtn">👁️ 显示释义</button>
    <button class="btn btn-primary" id="nextBtn">下一个 →</button>
  </div>

  <div class="stats">
    <div class="stat-item">
      <div class="stat-num" id="learnedCount">0</div>
      <div class="stat-label">已学习</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="totalCount">0</div>
      <div class="stat-label">总词汇</div>
    </div>
  </div>
</div>

<script>
const WORDS = [
  "aberration", "benevolent", "cryptic", "dubious", "eloquent",
  "futile", "gregarious", "hoist", "immutable", "jovial",
  "kinetic", "lethargic", "mundane", "naive", "obsolete",
  "pragmatic", "quaint", "resilient", "succinct", "tenacious",
  "ubiquitous", "versatile", "whimsical", "yearning", "zeal",
  "affinity", "brevity", "candor", "diligent", "empathy"
];

const STORAGE_KEY = 'vocab_learned_words';
let learnedWords = [];
let currentIndex = 0;
let currentWordData = null;

function getLearned() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}
function saveLearned(arr) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); } catch {}
}
function markLearned(word) {
  if (!learnedWords.includes(word)) {
    learnedWords.push(word);
    saveLearned(learnedWords);
  }
}

function updateProgress() {
  const pct = learnedWords.length > 0 ? (learnedWords.length / WORDS.length) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent =
    WORDS.length > 0 ? `已掌握 ${learnedWords.length} / ${WORDS.length}` : '';
  document.getElementById('learnedCount').textContent = learnedWords.length;
  document.getElementById('totalCount').textContent = WORDS.length;
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getNextWord() {
  const unlearned = WORDS.filter(w => !learnedWords.includes(w));
  if (unlearned.length === 0) {
    learnedWords = [];
    saveLearned([]);
    return WORDS[Math.floor(Math.random() * WORDS.length)];
  }
  return unlearned[Math.floor(Math.random() * unlearned.length)];
}

async function fetchWord(word) {
  try {
    const res = await fetch('/vocab-app/api/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ word })
    });
    if (!res.ok) throw new Error('API error');
    return await res.json();
  } catch {
    return null;
  }
}

function renderWord(data) {
  const wordDisplay = document.getElementById('wordDisplay');
  const wordPron = document.getElementById('wordPron');
  const defSection = document.getElementById('defSection');
  const showDefBtn = document.getElementById('showDefBtn');

  wordDisplay.textContent = data.word;
  wordPron.textContent = data.pronunciation || '';

  defSection.classList.remove('show');
  defSection.innerHTML = '';
  showDefBtn.textContent = '👁️ 显示释义';

  if (data.definitions && data.definitions.length) {
    let html = '';
    data.definitions.forEach(d => {
      html += `<div class="def-item">
        <span class="def-pos">${escapeHtml(d.part_of_speech)}</span>
        <div class="def-meaning">${escapeHtml(d.meaning)}</div>`;
      if (d.examples && d.examples.length) {
        html += '<ul class="def-examples">' +
          d.examples.map(e => `<li>${escapeHtml(e)}</li>`).join('') +
          '</ul>';
      }
      html += '</div>';
    });

    if (data.synonyms && data.synonyms.length) {
      html += '<div class="syn-section">' +
        data.synonyms.map(s => `<span class="syn-tag">${escapeHtml(s)}</span>`).join('') +
        '</div>';
    }

    defSection.innerHTML = html;
  }
}

function showDefinition() {
  const defSection = document.getElementById('defSection');
  const showDefBtn = document.getElementById('showDefBtn');
  if (defSection.classList.contains('show')) {
    defSection.classList.remove('show');
    showDefBtn.textContent = '👁️ 显示释义';
  } else {
    defSection.classList.add('show');
    showDefBtn.textContent = '🙈 隐藏释义';
  }
}

async function nextWord() {
  const card = document.getElementById('card');
  card.classList.add('switching');

  const word = getNextWord();
  currentWordData = null;

  document.getElementById('wordDisplay').textContent = '...';
  document.getElementById('wordPron').textContent = '';
  document.getElementById('defSection').classList.remove('show');
  document.getElementById('defSection').innerHTML = '';
  document.getElementById('showDefBtn').textContent = '👁️ 显示释义';
  document.getElementById('cardLoading').style.display = 'block';

  const data = await fetchWord(word);
  document.getElementById('cardLoading').style.display = 'none';

  if (data && data.word) {
    currentWordData = data;
    renderWord(data);
    markLearned(data.word);
  } else {
    currentWordData = { word, pronunciation: '', definitions: [], synonyms: [] };
    renderWord(currentWordData);
  }

  updateProgress();
  card.classList.remove('switching');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Init
learnedWords = getLearned();
updateProgress();
nextWord();

document.getElementById('showDefBtn').addEventListener('click', showDefinition);
document.getElementById('nextBtn').addEventListener('click', nextWord);

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextWord();
  if (e.key === ' ' || e.key === 'ArrowDown') { e.preventDefault(); showDefinition(); }
});
</script>
</body>
</html>
