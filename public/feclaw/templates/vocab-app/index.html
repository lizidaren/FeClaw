<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>词汇学习</title>
<style>
:root {
  --bg: #f0f4ff;
  --card-bg: rgba(255,255,255,0.85);
  --text: #1e293b;
  --text-secondary: #64748b;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --border: rgba(0,0,0,0.08);
  --shadow: 0 4px 24px rgba(0,0,0,0.06);
  --input-bg: rgba(255,255,255,0.7);
  --tag-bg: #eff6ff;
  --example-bg: #f8fafc;
}
@media (prefers-color-scheme: dark) {
:root {
  --bg: #0f172a;
  --card-bg: rgba(30,41,59,0.85);
  --text: #e2e8f0;
  --text-secondary: #94a3b8;
  --accent: #3b82f6;
  --accent-hover: #60a5fa;
  --border: rgba(255,255,255,0.08);
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --input-bg: rgba(30,41,59,0.7);
  --tag-bg: #1e3a5f;
  --example-bg: #1e293b;
}
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 40px 20px;
}
.container { width: 100%; max-width: 640px; }
h1 {
  text-align: center; font-size: 2.2rem; margin-bottom: 8px;
}
.subtitle {
  text-align: center; color: var(--text-secondary); margin-bottom: 32px;
}
.search-card, .result-card {
  background: var(--card-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  box-shadow: var(--shadow);
  margin-bottom: 24px;
}
.search-row {
  display: flex; gap: 12px;
}
.search-row input {
  flex: 1;
  padding: 14px 18px;
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 1.05rem;
  background: var(--input-bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.search-row input:focus { border-color: var(--accent); }
.btn {
  padding: 14px 28px;
  border: none; border-radius: 12px;
  font-size: 1rem; font-weight: 600; cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-outline {
  background: transparent; color: var(--accent);
  border: 2px solid var(--accent);
}
.btn-outline:hover { background: rgba(37,99,235,0.08); }
.nav-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.result-card { display: none; }
.result-card.show { display: block; }
.word-header { margin-bottom: 20px; }
.word-title { font-size: 1.8rem; font-weight: 700; }
.word-pron { color: var(--text-secondary); font-size: 1.05rem; margin-top: 4px; }
.def-item { margin-bottom: 16px; }
.def-pos {
  display: inline-block;
  background: var(--tag-bg);
  color: var(--accent);
  padding: 2px 10px; border-radius: 6px;
  font-size: 0.85rem; font-weight: 600;
  margin-bottom: 6px;
}
.def-meaning { font-size: 1.05rem; margin-bottom: 6px; }
.def-examples { margin-top: 6px; padding-left: 20px; }
.def-examples li { color: var(--text-secondary); font-size: 0.92rem; margin-bottom: 3px; }
.syn-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.syn-tag {
  background: var(--tag-bg); color: var(--accent);
  padding: 4px 12px; border-radius: 20px;
  font-size: 0.88rem;
}
.loading {
  text-align: center; color: var(--text-secondary);
  padding: 20px; display: none;
}
.loading.show { display: block; }
.error {
  color: #dc2626; text-align: center; padding: 12px; display: none;
}
.error.show { display: block; }
@media (max-width: 640px) {
  body { padding: 20px 12px; }
  h1 { font-size: 1.6rem; }
  .search-row { flex-direction: column; }
  .btn { width: 100%; text-align: center; }
  .search-card, .result-card { padding: 20px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>📖 词汇学习</h1>
  <p class="subtitle">查单词、背单词、轻松积累词汇量</p>

  <div class="search-card">
    <div class="search-row">
      <input type="text" id="wordInput" placeholder="输入英文单词，如 ubiquitous" autofocus>
      <button class="btn btn-primary" id="searchBtn">查询</button>
    </div>
  </div>

  <div class="loading" id="loading">🔍 正在查询...</div>
  <div class="error" id="error"></div>

  <div class="result-card" id="result">
    <div class="word-header">
      <div class="word-title" id="wordTitle"></div>
      <div class="word-pron" id="wordPron"></div>
    </div>
    <div id="definitions"></div>
    <div class="syn-tags" id="synonyms"></div>
  </div>

  <div class="nav-buttons">
    <a href="learn" class="btn btn-outline">🎯 开始学习</a>
    <a href="list" class="btn btn-outline">📋 词汇表</a>
  </div>
</div>

<script>
const input = document.getElementById('wordInput');
const searchBtn = document.getElementById('searchBtn');
const result = document.getElementById('result');
const loading = document.getElementById('loading');
const errorEl = document.getElementById('error');

async function queryWord(word) {
  result.classList.remove('show');
  errorEl.classList.remove('show');
  errorEl.textContent = '';
  loading.classList.add('show');

  try {
    const res = await fetch('/vocab-app/api/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ word })
    });
    if (!res.ok) throw new Error(`请求失败 (${res.status})`);
    const data = await res.json();
    renderResult(data);
  } catch (err) {
    errorEl.textContent = '查询失败: ' + err.message;
    errorEl.classList.add('show');
  } finally {
    loading.classList.remove('show');
  }
}

function renderResult(data) {
  document.getElementById('wordTitle').textContent = data.word;
  document.getElementById('wordPron').textContent = data.pronunciation || '';

  const defsEl = document.getElementById('definitions');
  defsEl.innerHTML = '';
  if (data.definitions && data.definitions.length) {
    data.definitions.forEach(d => {
      const div = document.createElement('div');
      div.className = 'def-item';
      div.innerHTML =
        `<span class="def-pos">${escapeHtml(d.part_of_speech)}</span>
         <div class="def-meaning">${escapeHtml(d.meaning)}</div>
         ${(d.examples && d.examples.length) ? '<ul class="def-examples">' +
           d.examples.map(e => `<li>${escapeHtml(e)}</li>`).join('') +
           '</ul>' : ''}`;
      defsEl.appendChild(div);
    });
  }

  const synEl = document.getElementById('synonyms');
  synEl.innerHTML = '';
  if (data.synonyms && data.synonyms.length) {
    data.synonyms.forEach(s => {
      const span = document.createElement('span');
      span.className = 'syn-tag';
      span.textContent = s;
      synEl.appendChild(span);
    });
  }

  result.classList.add('show');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

searchBtn.addEventListener('click', () => {
  const word = input.value.trim();
  if (!word) return;
  queryWord(word);
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') searchBtn.click();
});
</script>
</body>
</html>
